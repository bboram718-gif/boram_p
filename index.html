<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>보람 작업대</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23f3ecdd' stroke='%23a5432c' stroke-width='2'/%3E%3Ctext x='16' y='22' font-size='16' text-anchor='middle' fill='%23a5432c' font-family='serif'%3E%EB%B3%B4%3C/text%3E%3C/svg%3E">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#efe6d2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="보람 작업대">
  <script>
    // 화면 깜빡임 방지: 렌더 전에 저장된 테마를 미리 적용
    try {
      var t = localStorage.getItem("boramTaskDashboard.theme.v1");
      if (t === "dark" || (!t && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    } catch (e) {}
  </script>
  <style>
    :root {
      --bg-grad-1: #eae6db;
      --bg-grad-2: #e7e9e3;
      --bg-1: #f5f3ec;
      --bg-2: #edeae1;
      --panel: #ffffff;
      --panel-soft: #f6f4ec;
      --line: #e7e2d5;
      --line-strong: #d3ccbb;
      --text: #37332b;
      --muted: #837b6b;
      --muted-soft: #aba392;
      --accent: #7e6a46;
      --accent-dark: #5e4f30;
      --accent-soft: #efece2;
      --accent-soft-strong: #e2dbc9;
      --danger: #a8503a;
      --danger-soft: #f1e2da;
      --warning: #a37f3c;
      --warning-soft: #f1e9d6;
      --success: #607353;
      --success-soft: #e3e8d8;
      --chip: #efece3;
      --ink-red: #a8503a;
      --shadow: 0 12px 30px -18px rgba(70, 60, 40, .28), 0 1px 5px rgba(70, 60, 40, .06);
      --shadow-sm: 0 1px 6px rgba(70, 60, 40, .08);
      --radius: 12px;
      --radius-sm: 9px;
      --radius-pill: 999px;
      --serif: "Gowun Batang", "Nanum Myeongjo", Georgia, serif;
    }

    html[data-theme="dark"] {
      --bg-grad-1: #2a2418;
      --bg-grad-2: #241f16;
      --bg-1: #201c14;
      --bg-2: #17140e;
      --panel: #2b261c;
      --panel-soft: #322c20;
      --line: #443c2c;
      --line-strong: #564b36;
      --text: #ece2cd;
      --muted: #b3a583;
      --muted-soft: #8a7d5e;
      --accent: #c9a25f;
      --accent-dark: #ddba76;
      --accent-soft: #3a3222;
      --accent-soft-strong: #4b4029;
      --danger: #d9745c;
      --danger-soft: #3c2a20;
      --warning: #d0a24f;
      --warning-soft: #3a3018;
      --success: #9cae7e;
      --success-soft: #2a3020;
      --chip: #342d20;
      --ink-red: #d9745c;
      --shadow: 0 18px 40px -20px rgba(0, 0, 0, .65), 0 2px 10px rgba(0, 0, 0, .35);
      --shadow-sm: 0 2px 12px rgba(0, 0, 0, .4);
    }

    html { font-size: 14px; -webkit-text-size-adjust: 100%; }
    * { box-sizing: border-box; }

    ::selection { background: var(--accent-soft-strong); color: var(--accent-dark); }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(1200px 600px at 50% -10%, var(--bg-grad-1) 0%, transparent 65%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
      background-attachment: fixed;
      color: var(--text);
      font-family: "Pretendard Variable", Pretendard, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.55;
      letter-spacing: -.01em;
      transition: background-color .3s ease, color .3s ease;
    }
    .serif { font-family: var(--serif); }

    button, input, select, textarea { font: inherit; letter-spacing: -.01em; color: var(--text); }

    button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: var(--panel);
      color: var(--text);
      padding: 9px 14px;
      cursor: pointer;
      font-weight: 600;
      transition: transform .12s ease, border-color .15s ease, background .15s ease, box-shadow .15s ease, color .15s ease;
    }
    button:hover { border-color: var(--accent-soft-strong); background: var(--accent-soft); color: var(--accent-dark); }
    button:active { transform: translateY(1px) scale(.99); }
    button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, a:focus-visible {
      outline: 2px solid var(--accent); outline-offset: 2px;
    }

    .export-link {
      min-height: 42px; border: 1px solid var(--line); border-radius: var(--radius-sm);
      background: var(--panel); color: var(--accent-dark); display: inline-flex; align-items: center;
      justify-content: center; padding: 9px 14px; font-weight: 700; text-decoration: none;
    }
    .export-link[hidden] { display: none; }

    .primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border-color: transparent; color: #fff;
      box-shadow: 0 8px 20px -8px rgba(108, 92, 231, .55);
    }
    .primary:hover, .primary:focus-visible {
      background: linear-gradient(135deg, var(--accent-dark), var(--accent-dark));
      color: #fff; transform: translateY(-1px);
    }
    .danger { color: var(--danger); border-color: var(--line); background: var(--panel); }
    .danger:hover { background: var(--danger-soft); border-color: var(--danger); color: var(--danger); }

    input, select, textarea {
      width: 100%; min-height: 46px; border: 1px solid var(--line); border-radius: var(--radius-sm);
      background: var(--panel); padding: 10px 14px;
      transition: border-color .15s ease, box-shadow .15s ease, background .3s ease;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent-soft-strong); box-shadow: 0 0 0 4px var(--accent-soft); outline: none;
    }
    textarea { min-height: 94px; resize: vertical; }
    label { display: grid; gap: 6px; color: var(--muted); font-weight: 700; font-size: .9rem; }

    .app { max-width: 1180px; margin: 0 auto; padding: 18px 16px 60px; }

    /* ── 상단바 ── */
    .topbar {
      position: relative; display: flex; align-items: center; gap: 12px;
      margin-bottom: 14px; padding: 4px 2px;
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand-mark {
      width: 38px; height: 38px; border-radius: 50%; flex: none;
      background: transparent; border: 2px solid var(--ink-red); color: var(--ink-red);
      box-shadow: inset 0 0 0 2px var(--panel), inset 0 0 0 3px var(--ink-red);
      display: grid; place-items: center; font-family: var(--serif); font-size: 17px; font-weight: 700;
      transform: rotate(-8deg); opacity: .82;
    }
    h1 { margin: 0; font-family: var(--serif); font-size: 1.18rem; font-weight: 700; letter-spacing: 0; }
    .subtitle { margin: 2px 0 0; color: var(--muted); font-family: var(--serif); font-size: .8rem; letter-spacing: .02em; }
    .top-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .icon-round {
      width: 40px; height: 40px; min-height: 40px; padding: 0; border-radius: 12px;
      display: grid; place-items: center; font-size: 1.1rem; background: var(--panel); border: 1px solid var(--line);
    }
    .sync-dot {
      width: 10px; height: 10px; border-radius: 50%; background: var(--success);
      box-shadow: 0 0 0 3px rgba(18, 160, 111, .18); flex: none; margin-right: 2px;
      transition: background .2s ease, box-shadow .2s ease;
    }
    .sync-dot[data-state="busy"] { background: var(--warning); box-shadow: 0 0 0 3px rgba(217, 119, 6, .18); }
    .sync-dot[data-state="error"] { background: var(--danger); box-shadow: 0 0 0 3px rgba(224, 36, 94, .18); }
    .sync-dot[data-state="offline"] { background: var(--muted-soft); box-shadow: none; }

    /* 오버플로 메뉴 */
    .menu-wrap { position: relative; }
    .menu-pop {
      position: absolute; right: 0; top: 46px; z-index: 40; display: none;
      flex-direction: column; gap: 4px; padding: 8px; min-width: 180px;
      background: var(--panel); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow);
    }
    .menu-pop.open { display: flex; }
    .menu-pop button, .menu-pop .export-link {
      justify-content: flex-start; min-height: 40px; border: none; background: transparent;
      font-weight: 600; box-shadow: none;
    }
    .menu-pop button:hover, .menu-pop .export-link:hover { background: var(--accent-soft); }
    .hidden-file { display: none; }

    /* ── 빠른 입력 ── */
    .quick {
      display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: end;
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 14px; box-shadow: var(--shadow); margin-bottom: 8px;
    }
    .quick-field { display: grid; gap: 6px; }
    .quick-input-row { position: relative; }
    .quick-input-row input { min-height: 48px; padding-left: 40px; font-size: 1rem; }
    .quick-input-row::before {
      content: "✎"; position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--accent); font-size: 1rem; pointer-events: none;
    }
    .quick-buttons { display: flex; gap: 6px; }
    .quick-buttons .primary { padding: 0 20px; font-size: 1rem; }
    .quick-buttons .primary::before { content: "＋ "; }
    .detail-btn { padding: 0 12px; font-size: .82rem; color: var(--muted); }
    .quick-hint {
      margin: 3px 4px 14px; font-size: .74rem; color: var(--muted-soft);
    }
    .quick-hint b { color: var(--accent-dark); font-weight: 700; }

    /* ── 탭 ── */
    .tabs {
      display: flex; gap: 4px; flex-wrap: nowrap; overflow-x: auto; margin: 4px 0 12px;
      background: var(--panel-soft); border: 1px solid var(--line); padding: 5px;
      border-radius: var(--radius-pill); box-shadow: var(--shadow-sm); scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      min-height: 38px; border: none; border-radius: var(--radius-pill); background: transparent;
      color: var(--muted); flex: 1 0 auto; font-weight: 700; font-size: .9rem; white-space: nowrap;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 0 14px;
    }
    .tab:hover { background: var(--accent-soft); color: var(--accent-dark); }
    .tab.active { background: var(--panel); color: var(--accent-dark); box-shadow: var(--shadow-sm); }
    .tab .count {
      font-size: .72rem; font-weight: 800; min-width: 18px; height: 18px; padding: 0 5px;
      border-radius: 999px; background: var(--chip); color: var(--muted); display: inline-grid; place-items: center;
    }
    .tab.active .count { background: var(--accent); color: #fff; }
    .tab .count[data-empty="true"] { display: none; }

    /* ── 검색 ── */
    .search { position: relative; margin: 0 0 14px; }
    .search::before {
      content: "\1F50D"; position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      font-size: .85rem; opacity: .55; pointer-events: none;
    }
    .search input { min-height: 44px; padding-left: 38px; }

    /* ── 요약 바 ── */
    .summary {
      display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 6px;
      margin-bottom: 12px;
    }
    .stat {
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius-sm);
      padding: 8px 10px; display: grid; gap: 1px; box-shadow: var(--shadow-sm);
    }
    .stat strong { font-family: var(--serif); font-size: 1.25rem; font-weight: 700; letter-spacing: 0; line-height: 1.1; }
    .stat span { font-size: .68rem; color: var(--muted); font-weight: 600; }
    .stat.hot strong { color: var(--danger); }
    .stat.accent strong { color: var(--accent); }

    /* ── 섹션 ── */
    .section { margin-bottom: 12px; }
    .section-head { display: flex; align-items: center; gap: 6px; margin: 0 2px 7px; }
    .section-head h2 { margin: 0; font-size: .82rem; font-weight: 700; letter-spacing: 0; color: var(--muted); text-transform: none; }
    .section-head .muted {
      font-size: .68rem; color: var(--muted-soft); font-weight: 700;
    }
    .section-head .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted-soft); flex: none; }
    .section-head .dot.hot { background: var(--danger); }
    .section-head .dot.soon { background: var(--muted-soft); }
    .section-head .dot.fast { background: var(--muted-soft); }
    .cards { display: grid; gap: 7px; }
    .show-more { width: 100%; margin-top: 10px; color: var(--muted); font-size: .85rem; }
    .empty {
      border: 1px dashed var(--line-strong); border-radius: var(--radius-sm); padding: 14px;
      text-align: center; color: var(--muted-soft); font-size: .84rem; background: var(--panel-soft);
    }

    /* ── 카드 ── */
    .card {
      position: relative; border: 1px solid var(--line); background: var(--panel);
      border-radius: var(--radius); padding: 9px 11px; box-shadow: var(--shadow-sm);
      display: grid; gap: 6px; animation: cardIn .22s ease both;
      transition: box-shadow .16s ease, border-color .16s ease, opacity .3s ease;
    }
    .card:hover { box-shadow: var(--shadow); border-color: var(--line-strong); }
    .card[data-priority="터짐"] { border-left: 3px solid var(--ink-red); }
    .card.completing { opacity: 0; transform: translateX(14px) scale(.98); }
    @keyframes cardIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .card-main { display: flex; gap: 9px; align-items: flex-start; }
    /* 원탭 완료 체크 */
    .check {
      flex: none; width: 21px; height: 21px; margin-top: 1px;
      border-radius: 47% 53% 51% 49% / 50% 48% 52% 50%;
      border: 2px solid var(--line-strong); background: transparent; cursor: pointer; padding: 0;
      display: grid; place-items: center; min-height: 0; transition: all .16s ease;
    }
    .check:hover { border-color: var(--ink-red); background: var(--danger-soft); }
    .check::after {
      content: ""; width: 10px; height: 6px; border-left: 2.6px solid var(--ink-red);
      border-bottom: 2.6px solid var(--ink-red); transform: rotate(-45deg) scale(0); transition: transform .16s ease;
      margin-top: -2px;
    }
    .check:hover::after { transform: rotate(-45deg) scale(1); }

    .card-body { flex: 1; min-width: 0; display: grid; gap: 6px; }
    .card-titlerow { display: flex; align-items: flex-start; gap: 6px; }
    .card-title {
      flex: 1; font-size: .93rem; font-weight: 700; line-height: 1.35; letter-spacing: -.01em;
      word-break: break-word; cursor: text; border-radius: 6px; padding: 1px 3px; margin: -1px -3px;
    }
    .card-title:hover { background: var(--accent-soft); }
    .card-title[contenteditable="true"] { background: var(--accent-soft); outline: 2px solid var(--accent-soft-strong); cursor: text; }

    .card-meta { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
    .badge {
      font-size: .68rem; font-weight: 700; padding: 2px 7px; border-radius: 999px;
      background: var(--chip); color: var(--muted); white-space: nowrap; border: 1px solid transparent;
    }
    .badge.project { background: var(--accent-soft); color: var(--accent-dark); }
    .badge.hot { background: var(--danger-soft); color: var(--danger); }
    .badge.due { background: var(--panel); border-color: var(--line); color: var(--muted); }
    .badge.due.today { background: var(--warning-soft); color: var(--warning); }
    .badge.due.over { background: var(--danger-soft); color: var(--danger); }
    .status-select {
      width: auto; min-height: 0; height: 23px; padding: 1px 7px; font-size: .68rem; font-weight: 700;
      border-radius: 999px; background: var(--chip); border: 1px solid transparent; color: var(--muted);
      -webkit-appearance: none; appearance: none;
    }
    .status-select[data-status="진행 중"] { background: var(--accent-soft); color: var(--accent-dark); }
    .status-select[data-status="보류"] { background: var(--warning-soft); color: var(--warning); }

    .card-actions { display: flex; gap: 0; margin-left: auto; }
    .icon-btn {
      width: 27px; height: 27px; min-height: 0; padding: 0; border: none; background: transparent;
      border-radius: 8px; font-size: .82rem; opacity: .55; display: grid; place-items: center;
    }
    .icon-btn:hover { opacity: 1; background: var(--accent-soft); }
    .icon-btn.danger:hover { background: var(--danger-soft); }

    .note {
      font-size: .78rem; color: var(--muted); background: var(--panel-soft);
      border: 1px solid var(--line); border-radius: 8px; padding: 6px 8px; line-height: 1.45;
    }
    .note b { color: var(--text); font-weight: 700; font-size: .7rem; display: block; margin-bottom: 1px; }
    .note.hold { background: var(--warning-soft); border-color: transparent; color: var(--warning); }
    .note.hold b { color: var(--warning); }

    /* ── 하위 체크리스트 ── */
    .subs { display: grid; gap: 6px; }
    .sub-progress { display: flex; align-items: center; gap: 8px; }
    .sub-bar { flex: 1; height: 6px; border-radius: 999px; background: var(--chip); overflow: hidden; }
    .sub-bar > i { display: block; height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent), var(--accent-dark)); transition: width .3s ease; }
    .sub-count { font-size: .74rem; color: var(--muted); font-weight: 700; flex: none; }
    .sub-list { display: grid; gap: 2px; }
    .sub-item {
      display: flex; align-items: center; gap: 8px; font-size: .88rem; padding: 3px 4px; border-radius: 8px;
    }
    .sub-item:hover { background: var(--panel-soft); }
    .sub-check {
      width: 18px; height: 18px; min-height: 0; padding: 0; flex: none; border-radius: 5px;
      border: 2px solid var(--line-strong); background: var(--panel); display: grid; place-items: center;
    }
    .sub-check.done { background: var(--accent); border-color: var(--accent); color: #fff; font-size: .7rem; }
    .sub-text { flex: 1; word-break: break-word; }
    .sub-item.done .sub-text { text-decoration: line-through; color: var(--muted-soft); }
    .sub-del { width: 24px; height: 24px; min-height: 0; padding: 0; border: none; background: transparent; opacity: 0; font-size: .8rem; }
    .sub-item:hover .sub-del { opacity: .5; }
    .sub-del:hover { opacity: 1; background: var(--danger-soft); }
    .sub-add { display: flex; gap: 6px; margin-top: 2px; }
    .sub-add input { min-height: 36px; padding: 6px 10px; font-size: .85rem; }
    .sub-add button { min-height: 36px; padding: 0 12px; font-size: .82rem; }

    .add-sub-btn {
      align-self: start; min-height: 0; padding: 4px 10px; font-size: .78rem; color: var(--accent-dark);
      background: transparent; border: 1px dashed var(--line-strong); border-radius: 999px;
    }
    .add-sub-btn:hover { background: var(--accent-soft); border-style: solid; }

    /* ── 2주 그리드 ── */
    .week-grid { display: grid; gap: 10px; }
    .week-day {
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 12px; box-shadow: var(--shadow-sm);
    }
    .week-day.is-today { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent), var(--shadow-sm); }
    .week-day .section { margin: 0; }
    .week-day .cards { gap: 8px; }

    /* ── 프로젝트 ── */
    .project-group {
      background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
      margin-bottom: 10px; box-shadow: var(--shadow-sm); overflow: hidden;
    }
    .project-head { display: flex; align-items: center; gap: 8px; padding: 8px 10px; }
    .project-toggle {
      display: flex; align-items: center; gap: 8px; background: transparent; border: none;
      min-height: 0; padding: 5px 7px; border-radius: 8px; box-shadow: none;
    }
    .project-toggle:hover { background: var(--panel-soft); }
    .project-toggle h2 { margin: 0; font-family: var(--serif); font-size: 1.02rem; font-weight: 700; }
    .project-toggle .chev { color: var(--muted-soft); transition: transform .2s ease; font-size: .68rem; }
    .project-toggle[aria-expanded="true"] .chev { transform: rotate(90deg); }
    .badges { display: flex; gap: 5px; flex-wrap: wrap; }
    .badges .badge.hot[data-zero="true"] { display: none; }
    .proj-tools { margin-left: auto; display: flex; gap: 0; }
    .project-body { padding: 0 12px 12px; }
    .project-add { display: flex; gap: 6px; margin-bottom: 12px; }
    .project-add input { min-height: 42px; }
    .project-add button { min-height: 42px; padding: 0 16px; white-space: nowrap; }

    /* ── 완료 ── */
    .done-group { margin-bottom: 14px; }
    .done-group h2 {
      font-family: var(--serif); font-size: .95rem; color: var(--muted); font-weight: 700; margin: 0 2px 8px;
    }
    .done-row {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--panel);
      border: 1px solid var(--line); border-radius: var(--radius-sm); margin-bottom: 6px;
    }
    .done-row strong { font-weight: 600; }
    .done-row .meta { font-size: .76rem; color: var(--muted-soft); }
    .done-row.strike strong { text-decoration: line-through; color: var(--muted-soft); }
    .done-actions { margin-left: auto; display: flex; gap: 4px; }
    .done-actions button { min-height: 34px; padding: 0 10px; font-size: .8rem; }

    /* ── 모달 ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(20, 16, 45, .5); backdrop-filter: blur(3px);
      display: none; align-items: center; justify-content: center; padding: 18px; z-index: 60;
    }
    .modal-backdrop.open { display: flex; animation: fadeIn .18s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      width: 100%; max-width: 480px; background: var(--panel); border: 1px solid var(--line);
      border-radius: 20px; padding: 20px; box-shadow: var(--shadow); max-height: 90vh; overflow: auto;
      animation: popIn .2s ease; display: grid; gap: 14px;
    }
    @keyframes popIn { from { opacity: 0; transform: translateY(10px) scale(.98); } to { opacity: 1; transform: none; } }
    .modal h2 { margin: 0; font-family: var(--serif); font-weight: 700; font-size: 1.15rem; }
    .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-grid label.full { grid-column: 1 / -1; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .note-p { color: var(--muted); font-size: .9rem; margin: 0; }

    .toast {
      position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(20px);
      background: var(--text); color: var(--bg-1); padding: 10px 18px; border-radius: 999px;
      font-size: .85rem; font-weight: 600; box-shadow: var(--shadow); opacity: 0; pointer-events: none;
      transition: opacity .2s ease, transform .2s ease; z-index: 80;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
    }

    @media (min-width: 620px) {
      html { font-size: 15px; }
      .week-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (min-width: 920px) {
      .week-grid { grid-template-columns: 1fr 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">보</span>
        <div>
          <h1>보람 작업대</h1>
          <p class="subtitle" id="dateStamp">오늘의 기록</p>
        </div>
      </div>
      <div class="top-actions">
        <span id="syncDot" class="sync-dot" title="로컬 저장" aria-label="동기화 상태"></span>
        <button type="button" id="themeBtn" class="icon-round" title="라이트/다크 전환" aria-label="테마 전환">🌙</button>
        <div class="menu-wrap">
          <button type="button" id="menuBtn" class="icon-round" title="더보기" aria-label="더보기 메뉴" aria-haspopup="true">⋯</button>
          <div class="menu-pop" id="menuPop" role="menu">
            <button type="button" id="syncPullBtn">시트 새로고침</button>
            <button type="button" id="exportBtn">JSON 내보내기</button>
            <button type="button" id="importBtn">JSON 불러오기</button>
            <button type="button" id="clearSamplesBtn">샘플 삭제</button>
            <button type="button" id="resetBtn" class="danger">전체 초기화</button>
            <a href="#" id="exportLink" class="export-link" hidden>최근 JSON 받기</a>
            <input class="hidden-file" id="importFile" type="file" accept="application/json,.json" aria-label="JSON 파일 선택">
          </div>
        </div>
      </div>
    </header>

    <form class="quick" id="quickForm">
      <div class="quick-field quick-input-row">
        <label class="sr-only" for="quickInput">빠른 입력</label>
        <input id="quickInput" autocomplete="off" placeholder="생각나는 일 아무거나 입력">
      </div>
      <div class="quick-buttons">
        <button class="primary" type="submit">추가</button>
        <button class="detail-btn" type="button" id="quickDetailBtn" title="분류를 직접 정해서 추가">자세히</button>
      </div>
    </form>
    <p class="quick-hint">팁 — <b>/</b> 로 구분해 한 번에: <b>소품 정리 / 공연 / 내일 / 터짐 / 30분</b>. 프로젝트·날짜·중요도는 자동으로 알아채요.</p>

    <nav class="tabs" aria-label="주요 탭">
      <button type="button" class="tab active" data-tab="today">오늘 <span class="count" data-count="today"></span></button>
      <button type="button" class="tab" data-tab="week">2주 <span class="count" data-count="week"></span></button>
      <button type="button" class="tab" data-tab="project">프로젝트</button>
      <button type="button" class="tab" data-tab="waiting">보류 <span class="count" data-count="waiting"></span></button>
      <button type="button" class="tab" data-tab="done">완료</button>
    </nav>

    <div class="search">
      <label class="sr-only" for="searchInput">검색</label>
      <input id="searchInput" type="search" placeholder="검색 (제목·메모·프로젝트)">
    </div>

    <main id="appView" aria-live="polite"></main>
  </div>

  <!-- 수정 모달 -->
  <div class="modal-backdrop" id="editModal" role="dialog" aria-modal="true" aria-labelledby="editTitle">
    <form class="modal" id="editForm">
      <h2 id="editTitle">할 일 수정</h2>
      <div class="modal-grid">
        <label class="full">제목 <input id="editTaskTitle" required></label>
        <label>프로젝트 <select id="editProject"></select></label>
        <label>상태 <select id="editStatus"></select></label>
        <label>마감일 <input id="editDueDate" type="date"></label>
        <label>중요도 <select id="editPriority"></select></label>
        <label>소요시간 <select id="editEstimatedTime"></select></label>
        <label class="full">다음 행동 <input id="editNextAction"></label>
        <label class="full">메모 <textarea id="editMemo"></textarea></label>
        <label class="full" id="editHoldReasonField">보류 사유 <textarea id="editHoldReason"></textarea></label>
      </div>
      <div class="modal-actions">
        <button type="button" id="cancelEdit">취소</button>
        <button type="submit" class="primary">저장</button>
      </div>
    </form>
  </div>

  <!-- 사유 모달 -->
  <div class="modal-backdrop" id="reasonModal" role="dialog" aria-modal="true" aria-labelledby="reasonTitle">
    <form class="modal" id="reasonForm">
      <h2 id="reasonTitle">사유 입력</h2>
      <label><span id="reasonLabel">사유</span><textarea id="reasonInput"></textarea></label>
      <div class="modal-actions">
        <button type="button" id="cancelReason">취소</button>
        <button type="submit" class="primary">확인</button>
      </div>
    </form>
  </div>

  <!-- 확인 모달 -->
  <div class="modal-backdrop" id="confirmModal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
    <div class="modal">
      <h2 id="confirmTitle">확인</h2>
      <p id="confirmMessage" class="note-p"></p>
      <div class="modal-actions">
        <button type="button" id="confirmCancel">취소</button>
        <button type="button" id="confirmOk" class="primary">확인</button>
      </div>
    </div>
  </div>

  <!-- 동기화 모달 (숨김, 코드 호환 유지) -->
  <div class="modal-backdrop" id="syncModal" role="dialog" aria-modal="true" aria-labelledby="syncTitle">
    <form class="modal" id="syncForm">
      <h2 id="syncTitle">Google Sheets 동기화 설정</h2>
      <label class="full">Apps Script 웹앱 URL <input id="syncUrl" type="url" placeholder="https://script.google.com/macros/s/.../exec"></label>
      <label class="full">동기화 키 <input id="syncKey" autocomplete="off" placeholder="Apps Script에 넣은 SYNC_KEY"></label>
      <div class="modal-actions">
        <button type="button" id="disableSync">동기화 끄기</button>
        <button type="button" id="cancelSync">취소</button>
        <button type="submit" class="primary">저장</button>
      </div>
    </form>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ==========================================================================
    //  엔진 (저장 / 구글시트 동기화 / 마이그레이션 / 스마트 입력) — 기존 동작 유지
    // ==========================================================================
    const STORAGE_KEY = "boramTaskDashboard.tasks.v1";
    const SYNC_CONFIG_KEY = "boramTaskDashboard.sync.v1";
    const THEME_KEY = "boramTaskDashboard.theme.v1";
    // GitHub Pages에 올리면 이 값은 소스에서 보입니다. 개인용 주소로만 사용하세요.
    const BORAM_SHEETS_SYNC = {
      enabled: true,
      webAppUrl: "https://script.google.com/macros/s/AKfycbzpO92lpiYYRDAm35a1VZuCuWTpfY03gEtXX8LO14A5ffhsz0ane54qSVHIrcADXOf_/exec",
      syncKey: "dlfjs1223!"
    };
    const DATA_VERSION = 3;
    const PROJECTS_KEY = "boramTaskDashboard.projects.v1";
    const DEFAULT_PROJECTS = ["공연", "SMH", "가지트", "가치", "개인", "기타"];
    let PROJECTS = loadProjects();
    const STATUSES = ["해야 함", "진행 중", "완료", "보류"];
    const PRIORITIES = ["낮음", "보통", "높음", "터짐"];
    const TIMES = ["5분", "15분", "30분", "1시간", "길게"];

    const state = {
      tasks: [],
      activeTab: "today",
      expandedProjects: new Set(PROJECTS),
      sectionLimits: {},
      openSubs: new Set(),      // 체크리스트 입력창 열린 카드
      editingId: null,
      reasonResolver: null,
      confirmResolver: null,
      exportUrl: null,
      sync: { url: "", key: "", enabled: false, lastSyncAt: null },
      syncTimer: null,
      applyingRemote: false,
      lastLocalChangeAt: 0,
      lastAutoPullAt: 0
    };

    const $ = (selector) => document.querySelector(selector);
    const appView = $("#appView");

    function makeId() {
      return `${Date.now().toString(36)}${Math.random().toString(36).slice(2, 8)}`;
    }
    function todayDate() {
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }
    function toDateInput(date) {
      const d = new Date(date);
      const month = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${d.getFullYear()}-${month}-${day}`;
    }
    function addDays(days) {
      const date = todayDate();
      date.setDate(date.getDate() + days);
      return toDateInput(date);
    }
    function thisSunday(offsetWeeks = 0) {
      const date = todayDate();
      const day = date.getDay();
      date.setDate(date.getDate() + (7 - day) % 7 + offsetWeeks * 7);
      return toDateInput(date);
    }
    function displayPriority(priority) {
      return priority === "터짐" ? "오늘 무조건" : priority;
    }
    function formatShortDate(dateString) {
      if (!dateString) return "";
      const date = new Date(dateString);
      const weekdays = ["일", "월", "화", "수", "목", "금", "토"];
      return `${date.getMonth() + 1}/${date.getDate()} (${weekdays[date.getDay()]})`;
    }
    function isToday(dateString) {
      return dateString === toDateInput(todayDate());
    }
    function isOverdue(dateString) {
      if (!dateString) return false;
      return dateString < toDateInput(todayDate());
    }
    function isWithinNextDays(dateString, days) {
      if (!dateString) return false;
      const start = new Date(toDateInput(todayDate()));
      const target = new Date(dateString);
      const end = new Date(start);
      end.setDate(end.getDate() + days);
      return target >= start && target <= end;
    }
    function isInCurrentWeek(dateString) {
      if (!dateString) return false;
      const today = new Date(toDateInput(todayDate()));
      const dayOffset = (today.getDay() + 6) % 7;
      const start = new Date(today);
      start.setDate(start.getDate() - dayOffset);
      const end = new Date(start);
      end.setDate(end.getDate() + 6);
      const target = new Date(dateString);
      return target >= start && target <= end;
    }
    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;").replaceAll("'", "&#39;");
    }

    function readStoredTasks() {
      try { return window.localStorage.getItem(STORAGE_KEY); } catch { return null; }
    }
    function writeStoredTasks(tasks) {
      try { window.localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch {}
    }
    function removeStoredTasks() {
      try { window.localStorage.removeItem(STORAGE_KEY); } catch {}
    }

    // ── 프로젝트 목록 (사용자가 직접 추가/이름변경/삭제) ──
    function dedupe(arr) { return arr.filter((v, i) => arr.indexOf(v) === i); }
    function loadProjects() {
      try {
        const raw = window.localStorage.getItem("boramTaskDashboard.projects.v1");
        if (raw) {
          const arr = JSON.parse(raw);
          if (Array.isArray(arr) && arr.length) {
            const list = dedupe(arr.map((p) => String(p).trim()).filter(Boolean));
            if (!list.includes("기타")) list.push("기타");
            return list;
          }
        }
      } catch {}
      return ["공연", "SMH", "가지트", "가치", "개인", "기타"];
    }
    function saveProjects() {
      try { window.localStorage.setItem(PROJECTS_KEY, JSON.stringify(PROJECTS)); } catch {}
    }
    // 데이터(로컬/시트)에 있는 프로젝트가 목록에 없으면 자동으로 채워 넣습니다.
    function ensureProjectsFromTasks() {
      let changed = false;
      state.tasks.forEach((t) => {
        if (t.project && !PROJECTS.includes(t.project)) {
          const idx = PROJECTS.indexOf("기타");
          if (idx >= 0) PROJECTS.splice(idx, 0, t.project); else PROJECTS.push(t.project);
          changed = true;
        }
      });
      if (changed) saveProjects();
    }
    function addProjectName(name) {
      const n = String(name || "").trim();
      if (!n) return false;
      if (PROJECTS.includes(n)) { toast("이미 있는 프로젝트예요"); return false; }
      const idx = PROJECTS.indexOf("기타");
      if (idx >= 0) PROJECTS.splice(idx, 0, n); else PROJECTS.push(n);
      saveProjects();
      state.expandedProjects.add(n);
      fillSelects();
      renderApp();
      toast(`프로젝트 추가: ${n}`);
      return true;
    }
    async function renameProjectName(oldName) {
      const next = await askReason("프로젝트 이름 바꾸기", "새 이름을 적어주세요.", oldName);
      if (next === null) return;
      const n = next.trim();
      if (!n || n === oldName) return;
      if (PROJECTS.includes(n)) { await showNotice("이미 있는 이름이에요."); return; }
      PROJECTS = PROJECTS.map((p) => (p === oldName ? n : p));
      saveProjects();
      state.tasks = state.tasks.map((t) => (t.project === oldName ? normalizeTask({ ...t, project: n }) : t));
      if (state.expandedProjects.delete(oldName)) state.expandedProjects.add(n);
      saveTasks();
      fillSelects();
      renderApp();
      toast(`이름 변경: ${oldName} → ${n}`);
    }
    async function deleteProjectName(name) {
      if (name === "기타") { await showNotice("‘기타’는 지울 수 없어요."); return; }
      const count = state.tasks.filter((t) => t.project === name).length;
      const msg = count
        ? `‘${name}’ 프로젝트를 지울까요?\n이 프로젝트의 할 일 ${count}개는 ‘기타’로 옮겨져요.`
        : `‘${name}’ 프로젝트를 지울까요?`;
      if (!(await askConfirm(msg, { okText: "삭제" }))) return;
      PROJECTS = PROJECTS.filter((p) => p !== name);
      saveProjects();
      state.tasks = state.tasks.map((t) => (t.project === name ? normalizeTask({ ...t, project: "기타" }) : t));
      state.expandedProjects.delete(name);
      saveTasks();
      fillSelects();
      renderApp();
      toast(`삭제: ${name}`);
    }
    function readSyncConfig() {
      try { return JSON.parse(window.localStorage.getItem(SYNC_CONFIG_KEY) || "{}"); } catch { return {}; }
    }
    function writeSyncConfig() {
      try {
        window.localStorage.setItem(SYNC_CONFIG_KEY, JSON.stringify({ lastSyncAt: state.sync.lastSyncAt || null }));
      } catch {}
    }
    function loadSyncConfig() {
      const stored = readSyncConfig();
      state.sync.url = BORAM_SHEETS_SYNC.webAppUrl || "";
      state.sync.key = BORAM_SHEETS_SYNC.syncKey || "";
      state.sync.enabled = Boolean(BORAM_SHEETS_SYNC.enabled);
      state.sync.lastSyncAt = stored.lastSyncAt || null;
    }
    function hasSyncConfig() {
      return Boolean(state.sync.enabled && state.sync.url && state.sync.key);
    }
    function updateSyncStatus(text) {
      const dot = $("#syncDot");
      if (!dot) return;
      let stateName = "ok";
      if (text) {
        if (/실패/.test(text)) stateName = "error";
        else if (/중|대기/.test(text)) stateName = "busy";
      } else if (!hasSyncConfig()) {
        stateName = "offline";
      }
      dot.dataset.state = stateName;
      dot.title = text || (hasSyncConfig() ? (state.sync.lastSyncAt ? "시트 동기화됨" : "시트 연결됨") : "로컬 저장");
    }

    // 하위작업(subtasks)을 보존하는 정규화. 동기화도 이 필드를 그대로 전송합니다.
    function normalizeSubtasks(list) {
      if (!Array.isArray(list)) return [];
      return list
        .map((s) => ({ id: String(s && s.id || makeId()), title: String(s && s.title || "").trim(), done: Boolean(s && s.done) }))
        .filter((s) => s.title);
    }
    function normalizeTask(task) {
      const memo = task.memo || "";
      const legacyWaiting = task.status === "대기" ? (task.waitingReason || "") : "";
      const rawStatus = task.status === "대기" ? "보류" : task.status;
      const status = STATUSES.includes(rawStatus) ? rawStatus : "해야 함";
      return {
        id: String(task.id || makeId()),
        title: task.title || "제목 없음",
        project: task.project && String(task.project).trim() ? String(task.project).trim() : "기타",
        status,
        dueDate: task.dueDate || "",
        priority: PRIORITIES.includes(task.priority) ? task.priority : "보통",
        estimatedTime: TIMES.includes(task.estimatedTime) ? task.estimatedTime : "30분",
        memo,
        nextAction: task.nextAction || "",
        subtasks: normalizeSubtasks(task.subtasks),
        createdAt: task.createdAt || new Date().toISOString(),
        completedAt: task.completedAt || null,
        waitingReason: "",
        holdReason: task.holdReason || legacyWaiting || "",
        isSample: Boolean(task.isSample || memo.includes("샘플 데이터입니다")),
        schemaVersion: DATA_VERSION
      };
    }
    function migrateTasks(rawData) {
      const list = Array.isArray(rawData) ? rawData : (rawData && Array.isArray(rawData.tasks) ? rawData.tasks : []);
      return list.map(normalizeTask);
    }

    function loadTasks() {
      const raw = readStoredTasks();
      if (!raw) {
        state.tasks = sampleTasks();
        saveTasks({ remote: false });
        return;
      }
      try {
        const parsed = JSON.parse(raw);
        state.tasks = migrateTasks(parsed);
      } catch {
        state.tasks = sampleTasks();
      }
    }
    function saveTasks(options = {}) {
      writeStoredTasks(state.tasks);
      state.lastLocalChangeAt = Date.now();
      if (options.remote !== false) scheduleSheetSave();
    }

    function buildSyncUrl(params) {
      const query = new URLSearchParams(params).toString();
      return `${state.sync.url}?${query}`;
    }
    function readSheetJSONP() {
      return new Promise((resolve, reject) => {
        const callbackName = `boramSheet_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const script = document.createElement("script");
        const cleanup = () => {
          delete window[callbackName];
          if (script.parentNode) script.parentNode.removeChild(script);
          clearTimeout(timer);
        };
        const timer = setTimeout(() => { cleanup(); reject(new Error("시트 응답 시간이 초과되었습니다.")); }, 12000);
        window[callbackName] = (payload) => { cleanup(); resolve(payload); };
        script.onerror = () => { cleanup(); reject(new Error("시트에서 데이터를 읽지 못했습니다.")); };
        script.src = buildSyncUrl({ action: "read", key: state.sync.key, callback: callbackName, t: Date.now() });
        document.body.appendChild(script);
      });
    }
    async function pushTasksToSheet() {
      state.syncTimer = null;
      if (!hasSyncConfig() || state.applyingRemote) return;
      updateSyncStatus("시트 저장 중");
      try {
        const payload = { action: "save", key: state.sync.key, tasks: state.tasks, savedAt: new Date().toISOString() };
        await fetch(state.sync.url, {
          method: "POST", mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });
        state.sync.lastSyncAt = new Date().toISOString();
        writeSyncConfig();
        updateSyncStatus("시트 저장됨");
      } catch {
        updateSyncStatus("시트 저장 실패");
      }
    }
    function scheduleSheetSave() {
      if (!hasSyncConfig() || state.applyingRemote) return;
      clearTimeout(state.syncTimer);
      updateSyncStatus("저장 대기 중");
      state.syncTimer = setTimeout(pushTasksToSheet, 1200);
    }
    async function pullTasksFromSheet(options = {}) {
      if (!hasSyncConfig()) {
        if (!options.silent) await showNotice("먼저 동기화 설정을 저장해주세요.");
        return;
      }
      updateSyncStatus("시트 읽는 중");
      try {
        const payload = await readSheetJSONP();
        if (!payload || !payload.ok) throw new Error(payload && payload.error ? payload.error : "시트 읽기 실패");
        const incoming = migrateTasks(payload.tasks || []);
        if (!incoming.length && state.tasks.length) {
          if (options.initial) {
            await pushTasksToSheet();
          } else if (options.silent) {
            // 자동 동기화 중에는 방해하지 않음
          } else if (await askConfirm("시트가 비어 있습니다. 현재 데이터를 시트에 저장할까요?", { okText: "시트에 저장" })) {
            await pushTasksToSheet();
          }
          updateSyncStatus();
          return;
        }
        state.applyingRemote = true;
        state.tasks = incoming;
        saveTasks({ remote: false });
        state.applyingRemote = false;
        ensureProjectsFromTasks();
        fillSelects();
        renderApp();
        state.sync.lastSyncAt = new Date().toISOString();
        state.lastAutoPullAt = Date.now();
        writeSyncConfig();
        updateSyncStatus("시트에서 불러옴");
      } catch {
        state.applyingRemote = false;
        updateSyncStatus("시트 읽기 실패");
        if (!options.silent) await showNotice("Google Sheet에서 데이터를 읽지 못했습니다. URL과 동기화 키를 확인해주세요.");
      }
    }
    function maybeAutoPullFromSheet() {
      if (!hasSyncConfig() || state.applyingRemote) return;
      const now = Date.now();
      const hasPendingLocalSave = state.syncTimer || (now - state.lastLocalChangeAt < 5000);
      const pulledRecently = now - state.lastAutoPullAt < 30000;
      if (hasPendingLocalSave || pulledRecently) return;
      state.lastAutoPullAt = now;
      pullTasksFromSheet({ silent: true });
    }
    function openSyncModal() { updateSyncStatus(); }
    function closeSyncModal() { const m = $("#syncModal"); if (m) m.classList.remove("open"); }
    function saveSyncSettings() { loadSyncConfig(); closeSyncModal(); pullTasksFromSheet({ silent: true, initial: true }); }
    function disableSyncSettings() { updateSyncStatus(); closeSyncModal(); }

    function sampleTasks() {
      const base = [
        ["공연", "조명 디자인 큰 그림 잡기", "높음", "1시간", ["레퍼런스 5개 모으기", "무대 존 나누기", "장면별 색온도 메모"]],
        ["공연", "소품 체크표 만들기", "높음", "30분", []],
        ["SMH", "견적서 앱 수정사항 확인", "보통", "15분", []],
        ["가지트", "대관 안내문 점검", "보통", "15분", []],
        ["가치", "다음 모임 공지 정리", "보통", "30분", []],
        ["개인", "병원 일정 확인", "낮음", "5분", []]
      ];
      return base.map(([project, title, priority, estimatedTime, subs], index) => normalizeTask({
        id: makeId(), title, project, status: "해야 함",
        dueDate: index < 2 ? addDays(index) : "",
        priority, estimatedTime,
        subtasks: subs.map((s) => ({ id: makeId(), title: s, done: false })),
        memo: "샘플 데이터입니다. 필요 없으면 삭제하세요.",
        nextAction: "",
        createdAt: new Date(Date.now() - index * 60000).toISOString(),
        isSample: true
      }));
    }

    function applyQuickToken(parsed, token) {
      const value = token.trim();
      const lower = value.toLowerCase();
      if (!value) return;
      const project = PROJECTS.find((item) => item.toLowerCase() === lower);
      if (project) { parsed.project = project; return; }
      if (value === "오늘") parsed.dueDate = addDays(0);
      else if (value === "내일") parsed.dueDate = addDays(1);
      else if (value === "이번주") parsed.dueDate = thisSunday(0);
      else if (value === "다음주") parsed.dueDate = thisSunday(1);
      else if (/^\d{4}-\d{2}-\d{2}$/.test(value)) parsed.dueDate = value;
      if (["터짐", "오늘 무조건", "오늘무조건", "무조건", "급", "긴급"].includes(value)) parsed.priority = "터짐";
      else if (value === "중요" || value === "높음") parsed.priority = "높음";
      else if (value === "보통") parsed.priority = "보통";
      else if (value === "낮음" || value === "나중") parsed.priority = "낮음";
      const time = TIMES.find((item) => item === value);
      if (time) parsed.estimatedTime = time;
    }
    function parseQuickInput(text) {
      const value = text.trim();
      const lower = value.toLowerCase();
      const parts = value.split("/").map((part) => part.trim()).filter(Boolean);
      const parsed = {
        title: parts.length > 1 ? parts[0] : value,
        project: "기타", status: "해야 함", dueDate: "", priority: "보통", estimatedTime: "30분", memo: "", nextAction: ""
      };
      if (parts.length > 1) parts.slice(1).forEach((token) => applyQuickToken(parsed, token));
      const projectRules = [
        ["공연", ["공연", "조명", "음향", "소품", "의상", "예매", "극장"]],
        ["SMH", ["smh", "대표님", "견적서", "공정표", "일정", "인테리어"]],
        ["가지트", ["가지트", "대관", "청소", "예약", "공간"]],
        ["가치", ["가치", "모임", "오늘의 대사", "감정포커스", "멘토링"]],
        ["개인", ["병원", "건강", "집", "개인", "행정", "돈"]]
      ];
      if (parsed.project === "기타") {
        for (const [project, keywords] of projectRules) {
          if (PROJECTS.includes(project) && keywords.some((keyword) => lower.includes(keyword.toLowerCase()))) { parsed.project = project; break; }
        }
      }
      if (!parsed.dueDate) {
        if (value.includes("오늘")) parsed.dueDate = addDays(0);
        else if (value.includes("내일")) parsed.dueDate = addDays(1);
        else if (value.includes("다음주")) parsed.dueDate = thisSunday(1);
        else if (value.includes("이번주")) parsed.dueDate = thisSunday(0);
      }
      if (parsed.priority === "보통") {
        if (["급", "긴급", "필수", "터짐", "오늘 무조건", "무조건", "오늘 안 하면"].some((k) => value.includes(k))) parsed.priority = "터짐";
        else if (value.includes("중요")) parsed.priority = "높음";
        else if (value.includes("나중")) parsed.priority = "낮음";
      }
      if (parsed.estimatedTime === "30분") {
        if (value.includes("5분")) parsed.estimatedTime = "5분";
        else if (value.includes("15분")) parsed.estimatedTime = "15분";
        else if (value.includes("1시간")) parsed.estimatedTime = "1시간";
        else if (value.includes("길게")) parsed.estimatedTime = "길게";
      }
      return parsed;
    }

    function addTask(input) {
      const task = normalizeTask({ ...input, id: makeId(), createdAt: new Date().toISOString(), completedAt: null });
      state.tasks.unshift(task);
      saveTasks();
      renderApp();
      return task;
    }
    function updateTask(id, patch, options = {}) {
      state.tasks = state.tasks.map((task) => {
        if (task.id !== id) return task;
        const next = normalizeTask({ ...task, ...patch });
        if (next.status === "완료" && !next.completedAt) next.completedAt = new Date().toISOString();
        if (next.status !== "완료") next.completedAt = null;
        if (next.status !== "보류") next.holdReason = "";
        return next;
      });
      saveTasks();
      if (!options.skipRender) renderApp();
    }
    function findTask(id) { return state.tasks.find((t) => t.id === id); }

    async function deleteTask(id) {
      const task = findTask(id);
      if (!task) return;
      if (await askConfirm(`"${task.title}"을(를) 삭제할까요?`, { okText: "삭제" })) {
        state.tasks = state.tasks.filter((item) => item.id !== id);
        saveTasks();
        renderApp();
        toast("삭제했어요");
      }
    }
    async function setTaskStatus(id, status) {
      const patch = { status };
      if (status === "보류") {
        const reason = await askReason("보류 사유", "왜 미뤄두나요? (선택)");
        if (reason === null) return;
        patch.holdReason = reason.trim();
      }
      updateTask(id, patch);
    }

    // 하위 체크리스트
    function toggleSubtask(taskId, subId) {
      const task = findTask(taskId);
      if (!task) return;
      const subtasks = task.subtasks.map((s) => s.id === subId ? { ...s, done: !s.done } : s);
      updateTask(taskId, { subtasks });
    }
    function addSubtask(taskId, title) {
      const task = findTask(taskId);
      if (!task || !title.trim()) return;
      const subtasks = [...task.subtasks, { id: makeId(), title: title.trim(), done: false }];
      updateTask(taskId, { subtasks });
    }
    function deleteSubtask(taskId, subId) {
      const task = findTask(taskId);
      if (!task) return;
      updateTask(taskId, { subtasks: task.subtasks.filter((s) => s.id !== subId) });
    }

    function sortTasks(tasks) {
      return [...tasks].sort((a, b) => {
        const hotDiff = (a.priority === "터짐" ? 0 : 1) - (b.priority === "터짐" ? 0 : 1);
        if (hotDiff !== 0) return hotDiff;
        const overDiff = (isOverdue(a.dueDate) ? 0 : 1) - (isOverdue(b.dueDate) ? 0 : 1);
        if (overDiff !== 0) return overDiff;
        const hasDueDiff = (a.dueDate ? 0 : 1) - (b.dueDate ? 0 : 1);
        if (hasDueDiff !== 0) return hasDueDiff;
        if (a.dueDate && b.dueDate && a.dueDate !== b.dueDate) return a.dueDate.localeCompare(b.dueDate);
        const statusDiff = (a.status === "진행 중" ? 0 : 1) - (b.status === "진행 중" ? 0 : 1);
        if (statusDiff !== 0) return statusDiff;
        return new Date(b.createdAt) - new Date(a.createdAt);
      });
    }
    function sortProjectTasks(tasks) {
      const rank = (task) => {
        if (task.priority === "터짐" && task.status !== "완료") return 0;
        return { "진행 중": 1, "해야 함": 2, "보류": 3, "완료": 4 }[task.status] ?? 5;
      };
      return [...tasks].sort((a, b) => {
        const rankDiff = rank(a) - rank(b);
        if (rankDiff !== 0) return rankDiff;
        return sortTasks([a, b])[0].id === a.id ? -1 : 1;
      });
    }
    function filteredTasks(tasks = state.tasks) {
      const query = $("#searchInput").value.trim().toLowerCase();
      if (!query) return tasks;
      return tasks.filter((task) =>
        [task.title, task.memo, task.nextAction, task.project, task.holdReason]
          .some((field) => String(field || "").toLowerCase().includes(query)) ||
        task.subtasks.some((s) => s.title.toLowerCase().includes(query))
      );
    }

    // ==========================================================================
    //  렌더링 (새 UI)
    // ==========================================================================
    function activeCount(fn) { return state.tasks.filter(fn).length; }

    function updateTabCounts() {
      const todayN = activeCount((t) => t.status !== "완료" && t.status !== "보류" && (isToday(t.dueDate) || isOverdue(t.dueDate) || t.priority === "터짐"));
      const weekN = activeCount((t) => t.status !== "완료" && t.status !== "보류" && isWithinNextDays(t.dueDate, 13));
      const waitingN = activeCount((t) => t.status === "보류");
      const set = (key, n) => {
        const el = document.querySelector(`[data-count="${key}"]`);
        if (!el) return;
        el.textContent = n;
        el.dataset.empty = n === 0 ? "true" : "false";
      };
      set("today", todayN); set("week", weekN); set("waiting", waitingN);
    }

    function renderApp() {
      document.querySelectorAll(".tab").forEach((button) => {
        button.classList.toggle("active", button.dataset.tab === state.activeTab);
      });
      updateTabCounts();
      if (state.activeTab === "today") renderTodayTab();
      if (state.activeTab === "week") renderWeekTab();
      if (state.activeTab === "project") renderProjectTab();
      if (state.activeTab === "waiting") renderWaitingTab();
      if (state.activeTab === "done") renderDoneTab();
      updateSyncStatus();
    }

    function statCard(value, label, cls = "") {
      return `<div class="stat ${cls}"><strong>${value}</strong><span>${label}</span></div>`;
    }

    function renderTodayTab() {
      const tasks = filteredTasks();
      const active = tasks.filter((task) => !["완료", "보류"].includes(task.status));
      const todayDone = tasks.filter((task) => task.status === "완료" && task.completedAt && isToday(task.completedAt.slice(0, 10)));
      const shown = new Set();
      const take = (list) => {
        const unique = list.filter((task) => !shown.has(task.id));
        unique.forEach((task) => shown.add(task.id));
        return unique;
      };
      const sections = [
        ["over", "지났어요", "hot", take(active.filter((task) => isOverdue(task.dueDate)))],
        ["must", "오늘 무조건", "hot", take(active.filter((task) => task.priority === "터짐"))],
        ["today", "오늘 마감", "soon", take(active.filter((task) => isToday(task.dueDate)))],
        ["quick", "5분컷", "fast", take(active.filter((task) => task.estimatedTime === "5분"))],
        ["week", "이번 주 안", "", take(active.filter((task) => isWithinNextDays(task.dueDate, 7)))]
      ].filter(([, , , list]) => list.length);

      const totalToday = active.filter((task) => isToday(task.dueDate) || isOverdue(task.dueDate) || task.priority === "터짐").length;
      const html = `
        <div class="summary">
          ${statCard(totalToday, "오늘 처리", "accent")}
          ${statCard(active.filter((t) => t.priority === "터짐").length, "무조건", "hot")}
          ${statCard(tasks.filter((t) => t.status === "보류").length, "보류")}
          ${statCard(todayDone.length, "오늘 완료")}
        </div>
        ${sections.length
          ? sections.map(([key, title, dot, list]) => renderLimitedSection(key, title, dot, sortTasks(list))).join("")
          : `<div class="empty">🎉 오늘 급한 일이 없어요. 빠른 입력으로 할 일을 추가해 보세요.</div>`}
      `;
      appView.innerHTML = html;
    }

    function renderWeekTab() {
      const tasks = filteredTasks();
      const active = tasks.filter((task) => !["완료", "보류"].includes(task.status));
      const dates = Array.from({ length: 14 }, (_, index) => addDays(index));
      const twoWeekTasks = active.filter((task) => dates.includes(task.dueDate));
      const noDate = active.filter((task) => !task.dueDate);
      appView.innerHTML = `
        <div class="summary">
          ${statCard(twoWeekTasks.length, "2주 안 마감", "accent")}
          ${statCard(twoWeekTasks.filter((t) => isToday(t.dueDate)).length, "오늘")}
          ${statCard(twoWeekTasks.filter((t) => t.priority === "터짐").length, "무조건", "hot")}
          ${statCard(noDate.length, "날짜 없음")}
        </div>
        <div class="week-grid">
          ${dates.map((dateString, index) => {
            const list = sortTasks(twoWeekTasks.filter((task) => task.dueDate === dateString));
            const title = `${index === 0 ? "오늘 · " : index === 1 ? "내일 · " : ""}${formatShortDate(dateString)}`;
            return `<div class="week-day ${index === 0 ? "is-today" : ""}">${renderLimitedSection(`week-${dateString}`, title, index === 0 ? "soon" : "", list, true)}</div>`;
          }).join("")}
        </div>
      `;
    }

    function renderLimitedSection(key, title, dot, list, compact = false) {
      const limit = state.sectionLimits[key] || (compact ? 20 : 6);
      const visible = list.slice(0, limit);
      return `
        <section class="section" data-section-key="${key}">
          <div class="section-head">
            ${dot ? `<span class="dot ${dot}"></span>` : ""}
            <h2>${escapeHtml(title)}</h2>
            <span class="muted">${list.length}</span>
          </div>
          ${visible.length ? `<div class="cards">${visible.map(renderTaskCard).join("")}</div>` : `<div class="empty">${compact ? "없음" : "지금 볼 일이 없습니다."}</div>`}
          ${list.length > limit ? `<button type="button" class="show-more" data-action="show-more" data-section="${key}">${list.length - limit}개 더 보기</button>` : ""}
        </section>
      `;
    }

    function renderProjectTab() {
      const tasks = filteredTasks();
      appView.innerHTML = `
        <div class="project-add">
          <input type="text" id="newProjectInput" placeholder="새 프로젝트 이름 (예: 대학원 준비)" maxlength="24" autocomplete="off">
          <button type="button" class="primary" data-action="add-project">＋ 추가</button>
        </div>
        ${PROJECTS.map((project) => renderProjectGroup(project, tasks)).join("")}
      `;
    }
    function renderProjectGroup(project, tasks) {
      const allInProject = tasks.filter((task) => task.project === project);
      const list = sortProjectTasks(allInProject);
      const open = state.expandedProjects.has(project);
      const hotN = allInProject.filter((task) => task.priority === "터짐" && task.status !== "완료").length;
      const p = escapeHtml(project);
      return `
        <section class="project-group">
          <div class="project-head">
            <button type="button" class="project-toggle" data-action="toggle-project" data-project="${p}" aria-expanded="${open}">
              <span class="chev">▶</span>
              <h2>${p}</h2>
            </button>
            <span class="badges">
              <span class="badge">미완료 ${allInProject.filter((t) => t.status !== "완료").length}</span>
              <span class="badge hot" data-zero="${hotN === 0}">무조건 ${hotN}</span>
            </span>
            <span class="proj-tools">
              <button type="button" class="icon-btn" data-action="rename-project" data-project="${p}" title="이름 변경" aria-label="이름 변경">✏️</button>
              ${project === "기타" ? "" : `<button type="button" class="icon-btn danger" data-action="delete-project" data-project="${p}" title="프로젝트 삭제" aria-label="프로젝트 삭제">🗑</button>`}
            </span>
          </div>
          ${open ? `<div class="project-body">${list.length ? `<div class="cards">${list.map(renderTaskCard).join("")}</div>` : `<div class="empty">등록된 일이 없습니다.</div>`}</div>` : ""}
        </section>
      `;
    }

    function renderWaitingTab() {
      const tasks = filteredTasks();
      const held = sortTasks(tasks.filter((task) => task.status === "보류"));
      const check = sortTasks(tasks.filter((task) => task.status !== "완료" && task.status !== "보류" &&
        [task.title, task.memo, task.nextAction].some((f) => String(f || "").includes("확인"))));
      const sections = [["보류해 둔 일", held], ["확인 필요", check]];
      appView.innerHTML = sections.map(([title, list]) => `
        <section class="section">
          <div class="section-head"><h2>${title}</h2><span class="muted">${list.length}</span></div>
          ${list.length ? `<div class="cards">${list.map(renderTaskCard).join("")}</div>` : `<div class="empty">분리해 둘 일이 없습니다.</div>`}
        </section>
      `).join("");
    }

    function renderDoneTab() {
      const done = sortTasks(filteredTasks().filter((task) => task.status === "완료"));
      const grouped = done.reduce((acc, task) => {
        const key = task.completedAt ? task.completedAt.slice(0, 10) : "날짜 없음";
        (acc[key] = acc[key] || []).push(task);
        return acc;
      }, {});
      const dates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));
      appView.innerHTML = `
        <div class="summary">
          ${statCard(done.filter((t) => t.completedAt && isToday(t.completedAt.slice(0, 10))).length, "오늘 완료", "accent")}
          ${statCard(done.filter((t) => t.completedAt && isInCurrentWeek(t.completedAt.slice(0, 10))).length, "이번 주")}
          ${statCard(done.length, "전체 완료")}
          ${statCard(state.tasks.length, "전체 작업")}
        </div>
        <section class="section">
          ${dates.length ? dates.map((date) => renderDoneGroup(date, grouped[date])).join("") : `<div class="empty">완료 기록이 없습니다.</div>`}
        </section>
      `;
    }
    function renderDoneGroup(date, tasks) {
      const label = date === toDateInput(todayDate()) ? `오늘 · ${formatShortDate(date)}` : formatShortDate(date) || date;
      return `
        <div class="done-group">
          <h2>${label}</h2>
          ${tasks.map((task) => `
            <div class="done-row strike" data-task="${task.id}">
              <div>
                <strong>${escapeHtml(task.title)}</strong>
                <div class="meta">${escapeHtml(task.project)} · ${escapeHtml(task.estimatedTime)}</div>
              </div>
              <div class="done-actions">
                <button type="button" data-action="restore" data-id="${task.id}">되돌리기</button>
                <button type="button" class="danger" data-action="delete" data-id="${task.id}">삭제</button>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function dueBadge(task) {
      if (!task.dueDate) return "";
      let cls = "due";
      let label = formatShortDate(task.dueDate);
      if (isOverdue(task.dueDate)) { cls += " over"; label = "지남 · " + label; }
      else if (isToday(task.dueDate)) { cls += " today"; label = "오늘"; }
      return `<span class="badge ${cls}">${label}</span>`;
    }

    function renderSubs(task) {
      const total = task.subtasks.length;
      const open = state.openSubs.has(task.id);
      if (!total && !open) return "";
      const done = task.subtasks.filter((s) => s.done).length;
      const pct = total ? Math.round((done / total) * 100) : 0;
      return `
        <div class="subs">
          ${total ? `
            <div class="sub-progress">
              <div class="sub-bar"><i style="width:${pct}%"></i></div>
              <span class="sub-count">${done}/${total}</span>
            </div>
            <div class="sub-list">
              ${task.subtasks.map((s) => `
                <div class="sub-item ${s.done ? "done" : ""}">
                  <button type="button" class="sub-check ${s.done ? "done" : ""}" data-action="sub-toggle" data-id="${task.id}" data-sub="${s.id}" aria-label="완료 토글">${s.done ? "✓" : ""}</button>
                  <span class="sub-text">${escapeHtml(s.title)}</span>
                  <button type="button" class="sub-del" data-action="sub-del" data-id="${task.id}" data-sub="${s.id}" aria-label="삭제">✕</button>
                </div>
              `).join("")}
            </div>
          ` : ""}
          <div class="sub-add">
            <input type="text" data-sub-input="${task.id}" placeholder="세부 단계 추가 후 Enter">
            <button type="button" data-action="sub-add" data-id="${task.id}">추가</button>
          </div>
        </div>
      `;
    }

    function renderTaskCard(task) {
      const hot = task.priority === "터짐";
      return `
        <article class="card" data-task="${task.id}" data-priority="${escapeHtml(task.priority)}" data-status="${escapeHtml(task.status)}">
          <div class="card-main">
            <button type="button" class="check" data-action="complete" data-id="${task.id}" title="완료" aria-label="완료 처리"></button>
            <div class="card-body">
              <div class="card-titlerow">
                <div class="card-title" data-action="title-edit" data-id="${task.id}" title="눌러서 제목 수정">${escapeHtml(task.title)}</div>
                <div class="card-actions">
                  ${task.subtasks.length ? "" : `<button type="button" class="icon-btn" data-action="sub-open" data-id="${task.id}" title="세부 단계 추가" aria-label="세부 단계 추가">＋</button>`}
                  <button type="button" class="icon-btn" data-action="edit" data-id="${task.id}" title="상세 수정" aria-label="상세 수정">✏️</button>
                  <button type="button" class="icon-btn danger" data-action="delete" data-id="${task.id}" title="삭제" aria-label="삭제">🗑</button>
                </div>
              </div>
              <div class="card-meta">
                <span class="badge project">${escapeHtml(task.project)}</span>
                ${hot ? `<span class="badge hot">오늘 무조건</span>` : ""}
                ${dueBadge(task)}
                <span class="badge">${escapeHtml(task.estimatedTime)}</span>
                <select class="status-select" data-action="status-select" data-id="${task.id}" data-status="${escapeHtml(task.status)}" aria-label="상태 변경">
                  ${STATUSES.map((s) => `<option value="${s}" ${s === task.status ? "selected" : ""}>${escapeHtml(s)}</option>`).join("")}
                </select>
              </div>
              ${task.nextAction ? `<div class="note"><b>다음 행동</b>${escapeHtml(task.nextAction)}</div>` : ""}
              ${task.memo ? `<div class="note"><b>메모</b>${escapeHtml(task.memo)}</div>` : ""}
              ${task.holdReason ? `<div class="note hold"><b>보류 사유</b>${escapeHtml(task.holdReason)}</div>` : ""}
              ${renderSubs(task)}
            </div>
          </div>
        </article>
      `;
    }

    // ==========================================================================
    //  모달 / 유틸
    // ==========================================================================
    function openEditModal(id) {
      const task = findTask(id);
      if (!task) return;
      state.editingId = id;
      $("#editTaskTitle").value = task.title;
      $("#editProject").value = task.project;
      $("#editStatus").value = task.status;
      $("#editDueDate").value = task.dueDate;
      $("#editPriority").value = task.priority;
      $("#editEstimatedTime").value = task.estimatedTime;
      $("#editNextAction").value = task.nextAction;
      $("#editMemo").value = task.memo;
      $("#editHoldReason").value = task.holdReason;
      $("#editHoldReasonField").hidden = task.status !== "보류";
      $("#editModal").classList.add("open");
      $("#editTaskTitle").focus();
    }
    function closeEditModal() { state.editingId = null; $("#editModal").classList.remove("open"); }

    function askReason(title, label, initialValue = "") {
      return new Promise((resolve) => {
        state.reasonResolver = resolve;
        $("#reasonTitle").textContent = title;
        $("#reasonLabel").textContent = label;
        $("#reasonInput").value = initialValue;
        $("#reasonModal").classList.add("open");
        $("#reasonInput").focus();
      });
    }
    function closeReasonModal(value) {
      const resolver = state.reasonResolver;
      state.reasonResolver = null;
      $("#reasonModal").classList.remove("open");
      if (resolver) resolver(value);
    }
    function askConfirm(message, options = {}) {
      return new Promise((resolve) => {
        state.confirmResolver = resolve;
        $("#confirmMessage").textContent = message;
        $("#confirmOk").textContent = options.okText || "확인";
        $("#confirmCancel").textContent = options.cancelText || "취소";
        $("#confirmCancel").style.display = options.notice ? "none" : "";
        $("#confirmModal").classList.add("open");
        $("#confirmOk").focus();
      });
    }
    function closeConfirmModal(value) {
      const resolver = state.confirmResolver;
      state.confirmResolver = null;
      $("#confirmModal").classList.remove("open");
      $("#confirmCancel").style.display = "";
      if (resolver) resolver(value);
    }
    function showNotice(message) { return askConfirm(message, { okText: "확인", notice: true }); }

    let toastTimer = null;
    function toast(message) {
      const el = $("#toast");
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove("show"), 1800);
    }

    function timestampForFile() { return new Date().toISOString().slice(0, 19).replaceAll(":", "-"); }
    function downloadTasksJSON(tasks, filename, linkText = "최근 JSON 받기") {
      const blob = new Blob([JSON.stringify(tasks, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = $("#exportLink");
      if (state.exportUrl) URL.revokeObjectURL(state.exportUrl);
      state.exportUrl = url;
      link.href = url; link.download = filename; link.textContent = linkText; link.hidden = false;
      link.click();
    }
    function exportJSON() { downloadTasksJSON(state.tasks, `boram_tasks_${toDateInput(todayDate())}.json`); toast("JSON을 내보냈어요"); }
    function importJSON(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async () => {
        downloadTasksJSON(state.tasks, `boram_tasks_backup_${timestampForFile()}.json`, "불러오기 전 백업 받기");
        try {
          const data = JSON.parse(reader.result);
          const incoming = migrateTasks(data);
          const overwrite = await askConfirm("기존 데이터를 덮어쓸까요, 합칠까요?", { okText: "덮어쓰기", cancelText: "합치기" });
          if (overwrite) state.tasks = incoming;
          else {
            const ids = new Set(state.tasks.map((task) => task.id));
            state.tasks = [...state.tasks, ...incoming.filter((task) => !ids.has(task.id))];
          }
          saveTasks(); ensureProjectsFromTasks(); fillSelects(); renderApp(); toast("불러왔어요");
        } catch { await showNotice("JSON 파일을 읽을 수 없습니다."); }
      };
      reader.readAsText(file);
    }
    async function clearSampleData() {
      const sampleCount = state.tasks.filter((task) => task.isSample).length;
      if (!sampleCount) { await showNotice("삭제할 샘플 데이터가 없습니다."); return; }
      if (!(await askConfirm(`샘플 데이터 ${sampleCount}개를 삭제할까요?`, { okText: "샘플 삭제" }))) return;
      state.tasks = state.tasks.filter((task) => !task.isSample);
      saveTasks(); renderApp(); toast("샘플을 삭제했어요");
    }
    async function resetAllData() {
      if (!(await askConfirm("정말 전체 삭제할까요?", { okText: "삭제" }))) return;
      if (!(await askConfirm("복구할 수 없습니다. 그래도 삭제할까요?", { okText: "전체 삭제" }))) return;
      removeStoredTasks(); state.tasks = []; saveTasks(); renderApp(); toast("전체 초기화했어요");
    }

    function fillSelects() {
      const options = (items, labelFor = (item) => item) => items.map((item) => `<option value="${item}">${labelFor(item)}</option>`).join("");
      $("#editProject").innerHTML = options(PROJECTS);
      $("#editStatus").innerHTML = options(STATUSES);
      $("#editPriority").innerHTML = options(PRIORITIES, displayPriority);
      $("#editEstimatedTime").innerHTML = options(TIMES);
    }

    function submitQuickInput() {
      const input = $("#quickInput");
      const value = input.value.trim();
      if (!value) return;
      const task = addTask(parseQuickInput(value));
      input.value = ""; input.focus();
      toast(`추가: ${task.project} · ${task.title.slice(0, 16)}`);
    }
    function submitQuickInputDetailed() {
      const input = $("#quickInput");
      const value = input.value.trim();
      if (!value) return;
      const task = addTask(parseQuickInput(value));
      input.value = "";
      openEditModal(task.id);
    }

    // 완료 애니메이션 후 처리
    function animateComplete(id) {
      const card = document.querySelector(`.card[data-task="${id}"]`);
      const task = findTask(id);
      if (!task) return;
      if (task.status === "완료") { updateTask(id, { status: "해야 함" }); return; }
      if (card) {
        card.classList.add("completing");
        setTimeout(() => { updateTask(id, { status: "완료" }); toast("완료! 잘했어요 ✨"); }, 260);
      } else {
        updateTask(id, { status: "완료" });
      }
    }

    // 제목 인라인 수정
    function startTitleEdit(el, id) {
      if (el.getAttribute("contenteditable") === "true") return;
      el.setAttribute("contenteditable", "true");
      el.focus();
      const range = document.createRange();
      range.selectNodeContents(el);
      const sel = window.getSelection();
      sel.removeAllRanges(); sel.addRange(range);
      const finish = (save) => {
        el.removeEventListener("blur", onBlur);
        el.removeEventListener("keydown", onKey);
        el.setAttribute("contenteditable", "false");
        const text = el.textContent.trim();
        const task = findTask(id);
        if (save && text && task && text !== task.title) updateTask(id, { title: text });
        else if (task) el.textContent = task.title;
      };
      const onBlur = () => finish(true);
      const onKey = (e) => {
        if (e.key === "Enter") { e.preventDefault(); el.blur(); }
        if (e.key === "Escape") { e.preventDefault(); finish(false); }
      };
      el.addEventListener("blur", onBlur);
      el.addEventListener("keydown", onKey);
    }

    function toggleTheme() {
      const html = document.documentElement;
      const dark = html.getAttribute("data-theme") === "dark";
      if (dark) { html.removeAttribute("data-theme"); $("#themeBtn").textContent = "🌙"; }
      else { html.setAttribute("data-theme", "dark"); $("#themeBtn").textContent = "☀️"; }
      try { localStorage.setItem(THEME_KEY, dark ? "light" : "dark"); } catch {}
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.content = dark ? "#efe6d2" : "#23201a";
    }

    function bindEvents() {
      // 테마 버튼 초기 아이콘
      $("#themeBtn").textContent = document.documentElement.getAttribute("data-theme") === "dark" ? "☀️" : "🌙";
      $("#themeBtn").addEventListener("click", toggleTheme);

      // 오버플로 메뉴
      const menuPop = $("#menuPop");
      $("#menuBtn").addEventListener("click", (e) => { e.stopPropagation(); menuPop.classList.toggle("open"); });
      document.addEventListener("click", (e) => {
        if (!e.target.closest(".menu-wrap")) menuPop.classList.remove("open");
      });

      $("#editStatus").addEventListener("change", () => {
        $("#editHoldReasonField").hidden = $("#editStatus").value !== "보류";
      });
      $("#quickForm").addEventListener("submit", (event) => { event.preventDefault(); submitQuickInput(); });
      $("#quickDetailBtn").addEventListener("click", submitQuickInputDetailed);

      document.querySelector(".tabs").addEventListener("click", (event) => {
        const button = event.target.closest(".tab");
        if (!button) return;
        state.activeTab = button.dataset.tab;
        renderApp();
      });

      $("#searchInput").addEventListener("input", renderApp);
      $("#exportBtn").addEventListener("click", () => { exportJSON(); menuPop.classList.remove("open"); });
      $("#importBtn").addEventListener("click", () => $("#importFile").click());
      $("#importFile").addEventListener("change", (event) => { importJSON(event.target.files[0]); event.target.value = ""; });
      $("#syncPullBtn").addEventListener("click", () => { pullTasksFromSheet(); menuPop.classList.remove("open"); });
      $("#resetBtn").addEventListener("click", () => { resetAllData(); menuPop.classList.remove("open"); });
      $("#clearSamplesBtn").addEventListener("click", () => { clearSampleData(); menuPop.classList.remove("open"); });

      window.addEventListener("beforeunload", () => { if (state.exportUrl) URL.revokeObjectURL(state.exportUrl); });
      window.addEventListener("focus", maybeAutoPullFromSheet);
      document.addEventListener("visibilitychange", () => { if (!document.hidden) maybeAutoPullFromSheet(); });
      window.setInterval(() => { if (!document.hidden) maybeAutoPullFromSheet(); }, 60000);

      $("#cancelEdit").addEventListener("click", closeEditModal);
      $("#editModal").addEventListener("click", (event) => { if (event.target.id === "editModal") closeEditModal(); });
      $("#cancelReason").addEventListener("click", () => closeReasonModal(null));
      $("#reasonModal").addEventListener("click", (event) => { if (event.target.id === "reasonModal") closeReasonModal(null); });
      $("#reasonForm").addEventListener("submit", (event) => { event.preventDefault(); closeReasonModal($("#reasonInput").value); });
      $("#confirmCancel").addEventListener("click", () => closeConfirmModal(false));
      $("#confirmOk").addEventListener("click", () => closeConfirmModal(true));
      $("#confirmModal").addEventListener("click", (event) => { if (event.target.id === "confirmModal") closeConfirmModal(false); });
      $("#cancelSync").addEventListener("click", closeSyncModal);
      $("#disableSync").addEventListener("click", disableSyncSettings);
      $("#syncModal").addEventListener("click", (event) => { if (event.target.id === "syncModal") closeSyncModal(); });
      $("#syncForm").addEventListener("submit", (event) => { event.preventDefault(); saveSyncSettings(); });

      $("#editForm").addEventListener("submit", (event) => {
        event.preventDefault();
        if (!state.editingId) return;
        updateTask(state.editingId, {
          title: $("#editTaskTitle").value.trim(),
          project: $("#editProject").value,
          status: $("#editStatus").value,
          dueDate: $("#editDueDate").value,
          priority: $("#editPriority").value,
          estimatedTime: $("#editEstimatedTime").value,
          nextAction: $("#editNextAction").value.trim(),
          memo: $("#editMemo").value.trim(),
          holdReason: $("#editHoldReason").value.trim()
        });
        closeEditModal();
      });

      // 카드 클릭 위임
      appView.addEventListener("click", (event) => {
        const titleEl = event.target.closest('[data-action="title-edit"]');
        if (titleEl) { startTitleEdit(titleEl, titleEl.dataset.id); return; }

        const button = event.target.closest("button");
        if (!button) return;
        const id = button.dataset.id;
        const action = button.dataset.action;

        if (action === "toggle-project") {
          const project = button.dataset.project;
          state.expandedProjects.has(project) ? state.expandedProjects.delete(project) : state.expandedProjects.add(project);
          renderApp(); return;
        }
        if (action === "show-more") {
          const key = button.dataset.section;
          state.sectionLimits[key] = (state.sectionLimits[key] || 6) + 6;
          renderApp(); return;
        }
        if (action === "complete") { animateComplete(id); return; }
        if (action === "edit") return openEditModal(id);
        if (action === "delete") return deleteTask(id);
        if (action === "restore") return updateTask(id, { status: "해야 함", completedAt: null });
        if (action === "rename-project") return renameProjectName(button.dataset.project);
        if (action === "delete-project") return deleteProjectName(button.dataset.project);
        if (action === "add-project") {
          const inp = document.getElementById("newProjectInput");
          if (inp && inp.value.trim()) addProjectName(inp.value);
          return;
        }
        if (action === "sub-toggle") return toggleSubtask(id, button.dataset.sub);
        if (action === "sub-del") return deleteSubtask(id, button.dataset.sub);
        if (action === "sub-open") { state.openSubs.add(id); renderApp(); setTimeout(() => { const i = document.querySelector(`[data-sub-input="${id}"]`); if (i) i.focus(); }, 0); return; }
        if (action === "sub-add") {
          const input = document.querySelector(`[data-sub-input="${id}"]`);
          if (input && input.value.trim()) { state.openSubs.add(id); addSubtask(id, input.value); setTimeout(() => { const i = document.querySelector(`[data-sub-input="${id}"]`); if (i) i.focus(); }, 0); }
          return;
        }
      });

      // 세부단계 Enter로 추가
      appView.addEventListener("keydown", (event) => {
        const np = event.target.closest("#newProjectInput");
        if (np && event.key === "Enter") {
          event.preventDefault();
          if (np.value.trim()) addProjectName(np.value);
          return;
        }
        const input = event.target.closest("[data-sub-input]");
        if (input && event.key === "Enter") {
          event.preventDefault();
          const id = input.getAttribute("data-sub-input");
          if (input.value.trim()) { state.openSubs.add(id); addSubtask(id, input.value); setTimeout(() => { const i = document.querySelector(`[data-sub-input="${id}"]`); if (i) i.focus(); }, 0); }
        }
      });

      // 상태 셀렉트 / 마감일
      appView.addEventListener("change", async (event) => {
        const select = event.target.closest("select[data-action='status-select']");
        if (select) {
          const id = select.dataset.id;
          await setTaskStatus(id, select.value);
          const task = findTask(id);
          if (task && select.isConnected && select.value !== task.status) {
            select.value = task.status; select.dataset.status = task.status;
          }
          return;
        }
      });

      // 전역 단축키
      document.addEventListener("keydown", (event) => {
        const typing = /^(INPUT|TEXTAREA|SELECT)$/.test(event.target.tagName) || event.target.isContentEditable;
        if (event.key === "Escape") {
          document.querySelectorAll(".modal-backdrop.open").forEach((m) => m.classList.remove("open"));
        }
        if (typing) return;
        if (event.key === "n") { event.preventDefault(); $("#quickInput").focus(); }
        if (event.key === "/") { event.preventDefault(); $("#searchInput").focus(); }
      });
    }

    // ==========================================================================
    //  초기화
    // ==========================================================================
    (function stampDate() {
      const el = $("#dateStamp");
      if (!el) return;
      const d = new Date();
      const wd = ["일", "월", "화", "수", "목", "금", "토"][d.getDay()];
      el.textContent = `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일 ${wd}요일`;
    })();

    bindEvents();
    loadSyncConfig();
    loadTasks();
    ensureProjectsFromTasks();
    fillSelects();
    renderApp();
    if (hasSyncConfig()) pullTasksFromSheet({ silent: true, initial: true });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => { navigator.serviceWorker.register("./sw.js").catch(() => {}); });
    }
  </script>
</body>
</html>
