  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#6c5ce7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="보람 Workspace">
  <style>
    :root {
      --bg-1: #f7f6fd;
      --bg-2: #eef0fb;
      --panel: #ffffff;
      --panel-soft: #fbfaff;
      --line: #e6e3f3;
      --line-strong: #d9d5ee;
      --text: #201e33;
      --muted: #6d6a87;
      --muted-soft: #9795ad;
      --accent: #6c5ce7;
      --accent-dark: #5541d6;
      --accent-soft: #eeecff;
      --accent-soft-strong: #ded9ff;
      --danger: #e0245e;
      --danger-soft: #ffe3ea;
      --warning: #d97706;
      --warning-soft: #fef3d9;
      --success: #159a6c;
      --success-soft: #dcfce9;
      --shadow: 0 14px 34px -16px rgba(63, 48, 130, .22), 0 2px 8px rgba(63, 48, 130, .06);
      --shadow-sm: 0 2px 10px rgba(63, 48, 130, .08);
      --radius: 18px;
      --radius-sm: 12px;
      --radius-pill: 999px;
    }

    html { font-size: 14px; }

    * { box-sizing: border-box; }

    ::selection {
      background: var(--accent-soft-strong);
      color: var(--accent-dark);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(1100px 520px at 12% -8%, #efe9ff 0%, rgba(239, 233, 255, 0) 60%),
        radial-gradient(900px 480px at 100% 0%, #e4f1ff 0%, rgba(228, 241, 255, 0) 55%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
      background-attachment: fixed;
      color: var(--text);
      font-family: "Pretendard Variable", Pretendard, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      line-height: 1.55;
      letter-spacing: -.01em;
    }

    button, input, select, textarea {
      font: inherit;
      letter-spacing: -.01em;
    }

    button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #fff;
      color: var(--text);
      padding: 9px 14px;
      cursor: pointer;
      font-weight: 600;
      transition: transform .12s ease, border-color .15s ease, background .15s ease, box-shadow .15s ease, color .15s ease;
    }

    button:hover {
      border-color: var(--accent-soft-strong);
      background: var(--accent-soft);
      color: var(--accent-dark);
    }

    button:active {
      transform: translateY(1px) scale(.99);
    }

    button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, a:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .export-link {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #fff;
      color: var(--accent-dark);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 9px 14px;
      font-weight: 700;
      text-decoration: none;
      transition: background .15s ease, border-color .15s ease;
    }

    .export-link:hover {
      background: var(--accent-soft);
      border-color: var(--accent-soft-strong);
    }

    .export-link[hidden] {
      display: none;
    }

    .primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border-color: transparent;
      color: #fff;
      box-shadow: 0 8px 20px -8px rgba(108, 92, 231, .55);
    }

    .primary:hover, .primary:focus-visible {
      background: linear-gradient(135deg, var(--accent-dark), var(--accent-dark));
      color: #fff;
      transform: translateY(-1px);
    }

    .danger {
      color: var(--danger);
      border-color: #f6c9d4;
      background: #fff;
    }

    .danger:hover {
      background: var(--danger-soft);
      border-color: #f3a9bb;
      color: var(--danger);
    }

    /* 동기화 상태는 텍스트 라벨 없이, 우상단의 작은 점 하나로만 표시합니다. */
    .sync-status {
      position: absolute;
      top: 16px;
      right: 18px;
      width: 9px;
      height: 9px;
      min-height: 0;
      padding: 0;
      border: none;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 3px rgba(21, 154, 108, .18);
      font-size: 0;
      color: transparent;
      cursor: default;
    }

    .sync-status[data-state="busy"] {
      background: var(--warning);
      box-shadow: 0 0 0 3px rgba(217, 119, 6, .18);
    }

    .sync-status[data-state="error"] {
      background: var(--danger);
      box-shadow: 0 0 0 3px rgba(224, 36, 94, .18);
    }

    .sync-status[data-state="offline"] {
      background: var(--muted-soft);
      box-shadow: none;
    }

    input, select, textarea {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      background: #fff;
      color: var(--text);
      padding: 10px 14px;
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent-soft-strong);
      box-shadow: 0 0 0 4px var(--accent-soft);
      outline: none;
    }

    textarea {
      min-height: 94px;
      resize: vertical;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-weight: 700;
      font-size: .9rem;
    }

    .app {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 24px 60px;
    }

    .topbar {
      position: relative;
      margin-bottom: 16px;
      padding: 10px 34px 10px 2px;
    }

    /* 제목은 화면에서 존재감을 최소화합니다: 작고 옅은 한 줄 정도로. */
    h1 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: -.01em;
      font-weight: 700;
      color: var(--muted);
    }

    .subtitle {
      margin: 2px 0 0;
      color: var(--muted-soft);
      font-size: .82rem;
      font-weight: 500;
    }

    .quick {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .quick .primary {
      align-self: end;
      padding: 0 22px;
    }

    .quick .primary::before {
      content: "＋ ";
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 4px;
      flex-wrap: wrap;
      margin: 10px 0 8px;
      background: rgba(255, 255, 255, .55);
      border: 1px solid var(--line);
      padding: 5px;
      border-radius: var(--radius-pill);
      box-shadow: var(--shadow-sm);
    }

    .tab {
      min-height: 40px;
      border: none;
      border-radius: var(--radius-pill);
      background: transparent;
      color: var(--muted);
      flex: 1 1 auto;
      font-weight: 700;
      font-size: .93rem;
    }

    .tab:hover {
      background: rgba(108, 92, 231, .08);
      color: var(--accent-dark);
    }

    .tab.active, .filter.active {
      background: #fff;
      border-color: var(--accent);
      color: var(--accent-dark);
      box-shadow: var(--shadow-sm);
    }

    .filter {
      border-radius: var(--radius-pill);
      font-size: .88rem;
      padding: 7px 14px;
      min-height: 38px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .search {
      position: relative;
      margin: 8px 0 12px;
    }

    .search::before {
      content: "\1F50D";
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: .85rem;
      opacity: .55;
      pointer-events: none;
    }

    .search input {
      width: 100%;
      min-height: 42px;
      padding-left: 32px;
    }

    /* 상단 통계는 큼직한 카드 4개가 아니라, 숫자만 훑고 지나가는
       얇은 한 줄짜리 요약 바로 표시합니다. */
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .section, .project-group {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .stat {
      padding: 10px 6px;
      text-align: center;
      border-right: 1px solid var(--line);
    }

    .stat:last-child {
      border-right: none;
    }

    .stat strong {
      display: block;
      font-size: 1.3rem;
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -.02em;
      color: var(--accent-dark);
    }

    .stat:nth-child(4n+2) strong { color: var(--danger); }
    .stat:nth-child(4n+3) strong { color: var(--warning); }
    .stat:nth-child(4n+4) strong { color: var(--success); }

    .stat span {
      color: var(--muted);
      font-weight: 700;
      font-size: .72rem;
    }

    .section {
      padding: 16px;
      margin-bottom: 14px;
    }

    .section-head, .project-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    h2, h3 {
      margin: 0;
      letter-spacing: -.01em;
      font-weight: 800;
    }

    h2 { font-size: 1.15rem; }
    h3 { font-size: 1.05rem; }

    section[data-section-key="must"] .section-head h2::before { content: "🔥 "; }
    section[data-section-key="today"] .section-head h2::before { content: "☀️ "; }
    section[data-section-key="quick"] .section-head h2::before { content: "⚡ "; }
    section[data-section-key="week"] .section-head h2::before { content: "🗓️ "; }

    .section-head .muted {
      background: var(--accent-soft);
      color: var(--accent-dark);
      font-weight: 800;
      font-size: .82rem;
      padding: 3px 10px;
      border-radius: var(--radius-pill);
    }

    .muted {
      color: var(--muted);
    }

    .cards {
      display: grid;
      gap: 10px;
    }

    .card {
      border: 1px solid var(--line);
      border-left: 4px solid var(--line-strong);
      border-radius: var(--radius-sm);
      background: var(--panel-soft);
      padding: 14px 16px;
      transition: box-shadow .15s ease, transform .15s ease, border-color .15s ease;
    }

    .card:hover {
      box-shadow: var(--shadow-sm);
      transform: translateY(-1px);
    }

    .card[data-priority="터짐"] { border-left-color: var(--danger); }
    .card[data-priority="높음"] { border-left-color: var(--warning); }
    .card[data-priority="보통"] { border-left-color: var(--accent); }
    .card[data-priority="낮음"] { border-left-color: var(--line-strong); }
    .card[data-status="완료"] { opacity: .7; }
    .card[data-status="보류"] { opacity: .8; }

    .card-top {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .badge.tiny {
      min-height: 20px;
      padding: 2px 8px;
      font-size: .68rem;
    }

    .card-top-spacer {
      flex: 1 1 auto;
    }

    .card-title {
      margin-bottom: 8px;
    }

    .card-title strong {
      font-size: 1.02rem;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border: 1px solid var(--line);
      border-radius: var(--radius-pill);
      padding: 3px 10px;
      background: #f8f8fc;
      color: #46435e;
      font-weight: 700;
      font-size: .82rem;
      white-space: nowrap;
    }

    .badge.accent {
      border-color: var(--accent-soft-strong);
      background: var(--accent-soft);
      color: var(--accent-dark);
    }

    /* 완료/진행/대기/보류 버튼을 하나로 묶은 상태 선택 배지 */
    select.status-select {
      appearance: auto;
      -webkit-appearance: auto;
      width: auto;
      min-height: 26px;
      cursor: pointer;
      font-family: inherit;
    }

    .badge.hot, .badge[data-priority="터짐"] {
      border-color: #f4b8c8;
      background: var(--danger-soft);
      color: #b3134a;
      font-weight: 800;
    }

    .badge[data-priority="높음"] { border-color: #f3d19c; background: var(--warning-soft); color: #92500a; }
    .badge[data-priority="보통"] { border-color: var(--accent-soft-strong); background: var(--accent-soft); color: var(--accent-dark); }
    .badge[data-priority="낮음"] { border-color: var(--line); background: #f3f3f8; color: var(--muted); }

    .badge[data-status="완료"] { border-color: #9fe3c4; background: var(--success-soft); color: #0d7a54; }
    .badge[data-status="진행 중"] { border-color: var(--accent-soft-strong); background: var(--accent-soft); color: var(--accent-dark); }
    .badge[data-status="보류"] { border-color: #f3d19c; background: var(--warning-soft); color: #92500a; }
    .badge[data-status="해야 함"] { border-color: var(--line); background: #f8f8fc; color: #46435e; }

    .badge[data-project="공연"] { border-color: #d8c8ff; background: #f2ecff; color: #5b21b6; }
    .badge[data-project="SMH"] { border-color: #bfdbfe; background: #eff6ff; color: #1d4ed8; }
    .badge[data-project="가지트"] { border-color: #9ce0d0; background: #e7fbf5; color: #0f766e; }
    .badge[data-project="가치"] { border-color: #f7bfd6; background: #fff0f6; color: #be185d; }
    .badge[data-project="개인"] { border-color: #f3d19c; background: #fff7e8; color: #92500a; }
    .badge[data-project="기타"] { border-color: var(--line); background: #f4f4f8; color: var(--muted); }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 9px 14px;
      margin: 10px 0;
      color: var(--muted);
      font-weight: 600;
      font-size: .92rem;
    }

    .est-time {
      color: var(--muted);
      font-weight: 600;
      font-size: .82rem;
    }

    .note {
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 8px 12px;
      background: #f6f5ff;
      margin: 10px 0;
      color: #40405c;
      font-size: .93rem;
    }

    .note.note-memo {
      border-left-color: var(--accent);
      background: #f6f5ff;
    }

    .note.note-action {
      border-left-color: #1b8fd1;
      background: #eaf6ff;
    }

    .note.note-hold {
      border-left-color: var(--warning);
      background: var(--warning-soft);
    }

    .due-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .done-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .done-actions button {
      min-height: 40px;
      padding: 7px 12px;
      font-size: .88rem;
    }

    /* 마감일은 버튼 두 개(오늘/내일) 대신 날짜 입력 하나로 바로 수정합니다. */
    .due-label {
      flex: 0 0 auto;
      font-size: .78rem;
      font-weight: 700;
      color: var(--muted-soft);
    }

    .due-input {
      width: 100px;
      max-width: 100%;
      min-height: 26px;
      padding: 2px 3px;
      font-size: .74rem;
      flex: 0 0 auto;
    }

    /* 쪼개기는 핵심 기능이라 라벨을 남기되, 자리는 작게. */
    .card-top .icon-btn {
      flex: 0 0 auto;
      min-height: 24px;
      min-width: 24px;
      padding: 0;
      font-size: .82rem;
      line-height: 1;
      color: var(--muted-soft);
      border-color: transparent;
      background: transparent;
    }

    .icon-btn:hover {
      background: var(--accent-soft);
      color: var(--accent-dark);
      border-color: var(--accent-soft-strong);
    }

    .icon-btn.danger:hover {
      background: var(--danger-soft);
      color: var(--danger);
      border-color: #f3a9bb;
    }

    button[data-action="split-save"]::before { content: "💾 "; }
    button[data-action="edit"]:not(.icon-btn)::before { content: "✏️ "; }
    button[data-action="delete"]:not(.icon-btn)::before { content: "🗑️ "; }
    button[data-action="restore"]::before { content: "↩️ "; }

    button[data-action="complete"] {
      border-color: #9fe3c4;
      color: #0d7a54;
    }

    button[data-action="complete"]:hover {
      background: var(--success-soft);
    }

    .empty {
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      padding: 26px 18px;
      color: var(--muted-soft);
      background: var(--panel-soft);
      text-align: center;
      font-weight: 600;
    }

    .empty::before {
      content: "✨";
      display: block;
      font-size: 1.4rem;
      margin-bottom: 6px;
    }

    .project-group {
      margin-bottom: 12px;
      overflow: hidden;
    }

    .project-head {
      width: 100%;
      border: 0;
      border-radius: 0;
      background: #fff;
      padding: 16px;
      text-align: left;
    }

    .project-head:hover {
      background: var(--panel-soft);
    }

    .project-head h2::before { content: "📁 "; }

    .project-body {
      padding: 0 16px 16px;
    }

    .done-group {
      margin-bottom: 18px;
    }

    .done-group h2::before { content: "📅 "; }

    .week-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .week-day {
      min-height: 120px;
    }

    .done-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      padding: 12px 0;
    }

    .done-row:last-child {
      border-bottom: none;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(26, 20, 51, .5);
      backdrop-filter: blur(2px);
      z-index: 20;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(720px, 100%);
      max-height: 92vh;
      overflow: auto;
      background: #fff;
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: 0 30px 80px rgba(26, 20, 51, .32);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin: 14px 0;
    }

    .full {
      grid-column: 1 / -1;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .split-box {
      margin-top: 12px;
      display: none;
      gap: 8px;
    }

    .split-box.open {
      display: grid;
    }

    .hidden-file {
      display: none;
    }

    @media (max-width: 760px) {
      .app { padding: 14px; }
      .quick, .done-row { grid-template-columns: 1fr; }
      .week-grid { grid-template-columns: 1fr; }
      .quick button { width: 100%; }
      .form-grid { grid-template-columns: 1fr; }

      /* 탭/필터/카드 액션은 세로로 쌓이면 화면이 끝없이 길어지므로
         가로 스크롤 칩 형태로 표시합니다. */
      .tabs, .filters {
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .tabs::-webkit-scrollbar,
      .filters::-webkit-scrollbar {
        display: none;
      }
      .tab, .filter {
        flex: 0 0 auto;
        white-space: nowrap;
      }
    }

    @media (max-width: 420px) {
      .stat strong { font-size: 1.1rem; }
      .stat span { font-size: .66rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <span id="syncStatus" class="sync-status" title="로컬 저장" aria-label="동기화 상태: 로컬 저장"></span>
      <h1>보람 Workspace</h1>
      <p class="subtitle">머릿속에 떠다니는 일을 꺼내고, 오늘 할 일만 선명하게 보기.</p>
      <!-- 더 이상 화면에 노출하지 않는 관리용 버튼들. 코드에서만 쓰입니다. -->
      <button type="button" id="syncSettingsBtn" hidden>동기화 설정</button>
      <button type="button" id="syncPullBtn" hidden>시트 새로고침</button>
      <button type="button" id="clearSamplesBtn" hidden>샘플 삭제</button>
      <button type="button" id="resetBtn" class="danger" hidden>전체 초기화</button>
      <button type="button" id="exportBtn" hidden>JSON 내보내기</button>
      <button type="button" id="importBtn" hidden>JSON 불러오기</button>
      <a href="#" id="exportLink" class="export-link" hidden>최근 JSON 받기</a>
      <input class="hidden-file" id="importFile" type="file" accept="application/json,.json" aria-label="JSON 파일 선택">
    </header>

    <form class="quick" id="quickForm">
      <label class="full">
        빠른 입력
        <input id="quickInput" autocomplete="off" placeholder="생각나는 일 아무거나 입력">
      </label>
      <button class="primary" type="submit">추가</button>
    </form>

    <nav class="tabs" aria-label="주요 탭">
      <button type="button" class="tab active" data-tab="today">오늘</button>
      <button type="button" class="tab" data-tab="week">2주</button>
      <button type="button" class="tab" data-tab="project">프로젝트</button>
      <button type="button" class="tab" data-tab="waiting">보류</button>
      <button type="button" class="tab" data-tab="done">완료</button>
    </nav>

    <label class="search">
      <span class="sr-only">검색</span>
      <input id="searchInput" type="search" placeholder="검색">
    </label>

    <main id="appView" aria-live="polite"></main>
  </div>

  <div class="modal-backdrop" id="editModal" role="dialog" aria-modal="true" aria-labelledby="editTitle">
    <form class="modal" id="editForm">
      <h2 id="editTitle">할 일 수정</h2>
      <div class="form-grid">
        <label class="full">제목 <input id="editTaskTitle" required></label>
        <label>프로젝트 <select id="editProject"></select></label>
        <label>상태 <select id="editStatus"></select></label>
        <label>마감일 <input id="editDueDate" type="date"></label>
        <label>중요도 <select id="editPriority"></select></label>
        <label>소요시간 <select id="editEstimatedTime"></select></label>
        <label class="full">다음 행동 <input id="editNextAction"></label>
        <label class="full">메모 <textarea id="editMemo"></textarea></label>
        <label class="full" id="editHoldReasonField">보류 사유 <textarea id="editHoldReason"></textarea></label>
      </div>
      <div class="modal-actions">
        <button type="button" id="cancelEdit">취소</button>
        <button type="submit" class="primary">저장</button>
      </div>
    </form>
  </div>

  <div class="modal-backdrop" id="reasonModal" role="dialog" aria-modal="true" aria-labelledby="reasonTitle">
    <form class="modal" id="reasonForm">
      <h2 id="reasonTitle">사유 입력</h2>
      <label class="full">
        <span id="reasonLabel">사유</span>
        <textarea id="reasonInput"></textarea>
      </label>
      <div class="modal-actions">
        <button type="button" id="cancelReason">취소</button>
        <button type="submit" class="primary">저장</button>
      </div>
    </form>
  </div>

  <div class="modal-backdrop" id="confirmModal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
    <div class="modal">
      <h2 id="confirmTitle">확인</h2>
      <p id="confirmMessage" class="note"></p>
      <div class="modal-actions">
        <button type="button" id="confirmCancel">취소</button>
        <button type="button" id="confirmOk" class="primary">확인</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="syncModal" role="dialog" aria-modal="true" aria-labelledby="syncTitle">
    <form class="modal" id="syncForm">
      <h2 id="syncTitle">Google Sheets 동기화 설정</h2>
      <div class="note">
        Apps Script 웹앱 URL과 동기화 키를 넣으면 이 브라우저의 변경사항이 Google Sheet에 자동 저장됩니다.
      </div>
      <div class="form-grid">
        <label class="full">Apps Script 웹앱 URL <input id="syncUrl" type="url" placeholder="https://script.google.com/macros/s/.../exec"></label>
        <label class="full">동기화 키 <input id="syncKey" autocomplete="off" placeholder="Apps Script에 넣은 SYNC_KEY"></label>
      </div>
      <div class="modal-actions">
        <button type="button" id="disableSync">동기화 끄기</button>
        <button type="button" id="cancelSync">취소</button>
        <button type="submit" class="primary">저장</button>
      </div>
    </form>
  </div>

  <script>
    // Single active localStorage key. Kept stable so existing saved data continues to load.
    const STORAGE_KEY = "boramTaskDashboard.tasks.v1";
    const SYNC_CONFIG_KEY = "boramTaskDashboard.sync.v1";
    // 화면에 설정 버튼을 노출하지 않고 자동으로 Google Sheets와 동기화합니다.
    // 주의: GitHub Pages에 올리면 이 값은 HTML 소스에서 볼 수 있습니다. 개인용 주소로만 사용하세요.
    const BORAM_SHEETS_SYNC = {
      enabled: true,
      webAppUrl: "https://script.google.com/macros/s/AKfycbzpO92lpiYYRDAm35a1VZuCuWTpfY03gEtXX8LO14A5ffhsz0ane54qSVHIrcADXOf_/exec",
      syncKey: "dlfjs1223!"
    };
    const DATA_VERSION = 2;
    const PROJECTS = ["공연", "SMH", "가지트", "가치", "개인", "기타"];
    const STATUSES = ["해야 함", "진행 중", "완료", "보류"];
    const PRIORITIES = ["낮음", "보통", "높음", "터짐"];
    const TIMES = ["5분", "15분", "30분", "1시간", "길게"];
    const state = {
      tasks: [],
      activeTab: "today",
      expandedProjects: new Set(PROJECTS),
      sectionLimits: {},
      editingId: null,
      reasonResolver: null,
      confirmResolver: null,
      exportUrl: null,
      sync: { url: "", key: "", enabled: false, lastSyncAt: null },
      syncTimer: null,
      applyingRemote: false,
      lastLocalChangeAt: 0,
      lastAutoPullAt: 0
    };

    const $ = (selector) => document.querySelector(selector);
    const appView = $("#appView");

    function makeId() {
      return `${Date.now()}-${Math.random().toString(36).slice(2, 9)}`;
    }

    function todayDate() {
      return new Date();
    }

    function toDateInput(date) {
      const d = new Date(date);
      d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
      return d.toISOString().slice(0, 10);
    }

    function addDays(days) {
      const date = todayDate();
      date.setDate(date.getDate() + days);
      return toDateInput(date);
    }

    function thisSunday(offsetWeeks = 0) {
      const date = todayDate();
      const day = date.getDay();
      date.setDate(date.getDate() + (7 - day) + offsetWeeks * 7);
      return toDateInput(date);
    }

    function formatDate(dateString) {
      if (!dateString) return "마감 없음";
      return dateString;
    }

    function displayPriority(priority) {
      return priority === "터짐" ? "오늘 무조건" : priority;
    }

    function formatShortDate(dateString) {
      if (!dateString) return "";
      const date = new Date(dateString);
      const weekdays = ["일", "월", "화", "수", "목", "금", "토"];
      return `${date.getMonth() + 1}/${date.getDate()} ${weekdays[date.getDay()]}`;
    }

    function isToday(dateString) {
      return dateString === toDateInput(todayDate());
    }

    function isWithinNextDays(dateString, days) {
      if (!dateString) return false;
      const start = new Date(toDateInput(todayDate()));
      const target = new Date(dateString);
      const end = new Date(start);
      end.setDate(end.getDate() + days);
      return target >= start && target <= end;
    }

    function isInCurrentWeek(dateString) {
      if (!dateString) return false;
      const today = new Date(toDateInput(todayDate()));
      const dayOffset = (today.getDay() + 6) % 7;
      const start = new Date(today);
      start.setDate(today.getDate() - dayOffset);
      const end = new Date(start);
      end.setDate(start.getDate() + 6);
      const target = new Date(dateString);
      return target >= start && target <= end;
    }

    function isFutureOrEmpty(dateString) {
      if (!dateString) return true;
      return new Date(dateString) > new Date(toDateInput(todayDate()));
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function readStoredTasks() {
      try {
        return window.localStorage.getItem(STORAGE_KEY);
      } catch {
        return null;
      }
    }

    function writeStoredTasks(tasks) {
      try {
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
      } catch {
        // Some privacy modes block localStorage. The app keeps working in memory.
      }
    }

    function removeStoredTasks() {
      try {
        window.localStorage.removeItem(STORAGE_KEY);
      } catch {
        // Ignore blocked storage removal; in-memory state is cleared below.
      }
    }

    function readSyncConfig() {
      try {
        return JSON.parse(window.localStorage.getItem(SYNC_CONFIG_KEY) || "{}");
      } catch {
        return {};
      }
    }

    function writeSyncConfig() {
      try {
        // URL/키는 화면 설정값이 아니라 고정 상수로 쓰고, 마지막 동기화 시각만 저장합니다.
        window.localStorage.setItem(SYNC_CONFIG_KEY, JSON.stringify({ lastSyncAt: state.sync.lastSyncAt || null }));
      } catch {
        // Sync metadata is optional; local save still works.
      }
    }

    function loadSyncConfig() {
      const stored = readSyncConfig();
      state.sync = {
        url: BORAM_SHEETS_SYNC.webAppUrl || "",
        key: BORAM_SHEETS_SYNC.syncKey || "",
        enabled: Boolean(BORAM_SHEETS_SYNC.enabled && BORAM_SHEETS_SYNC.webAppUrl && BORAM_SHEETS_SYNC.syncKey),
        lastSyncAt: stored.lastSyncAt || null
      };
      updateSyncStatus();
    }

    function hasSyncConfig() {
      return Boolean(state.sync.enabled && state.sync.url && state.sync.key);
    }

    function updateSyncStatus(text) {
      const status = $("#syncStatus");
      if (!status) return;
      const label = text || (hasSyncConfig() ? (state.sync.lastSyncAt ? "시트 동기화됨" : "시트 연결됨") : "로컬 저장");
      status.title = label;
      status.setAttribute("aria-label", `동기화 상태: ${label}`);
      let syncState = "ok";
      if (label.includes("실패")) syncState = "error";
      else if (label.includes("중") || label.includes("대기") || label.includes("확인 필요")) syncState = "busy";
      else if (!hasSyncConfig()) syncState = "offline";
      status.dataset.state = syncState;
    }

    function migrateTasks(rawData) {
      const list = Array.isArray(rawData)
        ? rawData
        : Array.isArray(rawData && rawData.tasks)
          ? rawData.tasks
          : null;
      if (!list) throw new Error("tasks 배열이 없습니다.");
      return list.map(normalizeTask);
    }

    function loadTasks() {
      const raw = readStoredTasks();
      if (!raw) {
        state.tasks = [];
        saveTasks({ remote: false });
        return;
      }
      try {
        const parsed = JSON.parse(raw);
        state.tasks = migrateTasks(parsed).filter((task) => !task.isSample);
        saveTasks({ remote: false });
      } catch {
        state.tasks = [];
      }
    }

    function saveTasks(options = {}) {
      writeStoredTasks(state.tasks);
      if (options.remote !== false && !state.applyingRemote) {
        state.lastLocalChangeAt = Date.now();
        scheduleSheetSave();
      }
    }

    function buildSyncUrl(params) {
      const query = new URLSearchParams(params).toString();
      return `${state.sync.url}${state.sync.url.includes("?") ? "&" : "?"}${query}`;
    }

    function readSheetJSONP() {
      return new Promise((resolve, reject) => {
        if (!hasSyncConfig()) {
          reject(new Error("동기화 설정이 없습니다."));
          return;
        }

        const callbackName = `boramSheet_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const script = document.createElement("script");
        const cleanup = () => {
          delete window[callbackName];
          script.remove();
          clearTimeout(timer);
        };
        const timer = setTimeout(() => {
          cleanup();
          reject(new Error("시트 응답 시간이 초과되었습니다."));
        }, 12000);

        window[callbackName] = (payload) => {
          cleanup();
          resolve(payload);
        };
        script.onerror = () => {
          cleanup();
          reject(new Error("시트에서 데이터를 읽지 못했습니다."));
        };
        script.src = buildSyncUrl({ action: "read", key: state.sync.key, callback: callbackName, t: Date.now() });
        document.body.appendChild(script);
      });
    }

    async function pushTasksToSheet() {
      state.syncTimer = null;
      if (!hasSyncConfig() || state.applyingRemote) return;
      updateSyncStatus("시트 저장 중");
      try {
        const payload = {
          action: "save",
          key: state.sync.key,
          tasks: state.tasks,
          savedAt: new Date().toISOString()
        };
        await fetch(state.sync.url, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });
        state.sync.lastSyncAt = new Date().toISOString();
        writeSyncConfig();
        updateSyncStatus("시트 저장됨");
      } catch {
        updateSyncStatus("시트 저장 실패");
      }
    }

    function scheduleSheetSave() {
      if (!hasSyncConfig() || state.applyingRemote) return;
      clearTimeout(state.syncTimer);
      updateSyncStatus("저장 대기 중");
      state.syncTimer = setTimeout(pushTasksToSheet, 1200);
    }

    async function pullTasksFromSheet(options = {}) {
      if (!hasSyncConfig()) {
        if (!options.silent) await showNotice("먼저 동기화 설정을 저장해주세요.");
        return;
      }

      updateSyncStatus("시트 읽는 중");
      try {
        const payload = await readSheetJSONP();
        if (!payload || !payload.ok) throw new Error(payload && payload.error ? payload.error : "시트 읽기 실패");
        const incoming = migrateTasks(payload.tasks || []);

        if (!incoming.length && state.tasks.length) {
          if (options.initial) {
            await pushTasksToSheet();
          } else if (options.silent) {
            // 백그라운드 자동 동기화 중에는 팝업을 띄우지 않습니다.
            // 시트가 일시적으로 비어 보여도 사용자를 방해하지 않고 다음 시도를 기다립니다.
          } else if (await askConfirm("시트가 비어 있습니다. 현재 데이터를 시트에 저장할까요?", { okText: "시트에 저장" })) {
            await pushTasksToSheet();
          }
          updateSyncStatus();
          return;
        }

        state.applyingRemote = true;
        state.tasks = incoming;
        saveTasks({ remote: false });
        state.applyingRemote = false;
        renderApp();
        state.sync.lastSyncAt = new Date().toISOString();
        state.lastAutoPullAt = Date.now();
        writeSyncConfig();
        updateSyncStatus("시트에서 불러옴");
      } catch {
        state.applyingRemote = false;
        updateSyncStatus("시트 읽기 실패");
        if (!options.silent) await showNotice("Google Sheet에서 데이터를 읽지 못했습니다. 설정 URL과 동기화 키를 확인해주세요.");
      }
    }

    function maybeAutoPullFromSheet() {
      if (!hasSyncConfig() || state.applyingRemote) return;
      const now = Date.now();
      const hasPendingLocalSave = state.syncTimer || (now - state.lastLocalChangeAt < 5000);
      const pulledRecently = now - state.lastAutoPullAt < 30000;
      if (hasPendingLocalSave || pulledRecently) return;
      state.lastAutoPullAt = now;
      pullTasksFromSheet({ silent: true });
    }

    function openSyncModal() {
      // 자동 동기화 고정 방식이므로 사용자 설정 모달은 열지 않습니다.
      updateSyncStatus();
    }

    function closeSyncModal() {
      const modal = $("#syncModal");
      if (modal) modal.classList.remove("open");
    }

    function saveSyncSettings() {
      // 설정값은 BORAM_SHEETS_SYNC 상수를 사용합니다. 화면 입력값 저장은 하지 않습니다.
      loadSyncConfig();
      closeSyncModal();
      pullTasksFromSheet({ silent: true, initial: true });
    }

    function disableSyncSettings() {
      // 사용자 화면에서는 동기화 끄기를 제공하지 않습니다. 필요하면 BORAM_SHEETS_SYNC.enabled를 false로 바꾸세요.
      updateSyncStatus();
      closeSyncModal();
    }

    function normalizeTask(task) {
      const memo = task.memo || "";
      // "대기"는 "보류"로 통합되었습니다. 예전 데이터의 대기 사유는
      // 보류 사유로 옮겨서 내용을 그대로 보존합니다.
      const legacyWaiting = task.status === "대기" ? (task.waitingReason || "") : "";
      const rawStatus = task.status === "대기" ? "보류" : task.status;
      const status = STATUSES.includes(rawStatus) ? rawStatus : "해야 함";
      return {
        id: String(task.id || makeId()),
        title: task.title || "제목 없음",
        project: PROJECTS.includes(task.project) ? task.project : "기타",
        status,
        dueDate: task.dueDate || "",
        priority: PRIORITIES.includes(task.priority) ? task.priority : "보통",
        estimatedTime: TIMES.includes(task.estimatedTime) ? task.estimatedTime : "30분",
        memo,
        nextAction: task.nextAction || "",
        createdAt: task.createdAt || new Date().toISOString(),
        completedAt: task.completedAt || null,
        waitingReason: "",
        holdReason: task.holdReason || legacyWaiting || "",
        isSample: Boolean(task.isSample || memo.includes("샘플 데이터입니다")),
        schemaVersion: DATA_VERSION
      };
    }

    function sampleTasks() {
      const base = [
        ["공연", "조명 디자인 큰 그림 잡기", "높음", "1시간"],
        ["공연", "소품 체크표 만들기", "높음", "30분"],
        ["SMH", "견적서 앱 수정사항 확인", "보통", "15분"],
        ["가지트", "대관 안내문 점검", "보통", "15분"],
        ["가치", "다음 모임 공지 정리", "보통", "30분"],
        ["개인", "병원 일정 확인", "낮음", "5분"]
      ];
      return base.map(([project, title, priority, estimatedTime], index) => normalizeTask({
        id: makeId(),
        title,
        project,
        status: "해야 함",
        dueDate: index < 2 ? addDays(index) : "",
        priority,
        estimatedTime,
        memo: "샘플 데이터입니다. 필요 없으면 삭제하세요.",
        nextAction: "",
        createdAt: new Date(Date.now() - index * 60000).toISOString(),
        isSample: true
      }));
    }

    function applyQuickToken(parsed, token) {
      const value = token.trim();
      const lower = value.toLowerCase();
      if (!value) return;

      const project = PROJECTS.find((item) => item.toLowerCase() === lower);
      if (project) {
        parsed.project = project;
        return;
      }

      if (value === "오늘") parsed.dueDate = addDays(0);
      else if (value === "내일") parsed.dueDate = addDays(1);
      else if (value === "이번주") parsed.dueDate = thisSunday(0);
      else if (value === "다음주") parsed.dueDate = thisSunday(1);
      else if (/^\d{4}-\d{2}-\d{2}$/.test(value)) parsed.dueDate = value;

      if (value === "터짐" || value === "오늘 무조건" || value === "오늘무조건" || value === "무조건" || value === "급" || value === "긴급") parsed.priority = "터짐";
      else if (value === "중요" || value === "높음") parsed.priority = "높음";
      else if (value === "보통") parsed.priority = "보통";
      else if (value === "낮음" || value === "나중") parsed.priority = "낮음";

      const time = TIMES.find((item) => item === value);
      if (time) parsed.estimatedTime = time;
    }

    function parseQuickInput(text) {
      const value = text.trim();
      const lower = value.toLowerCase();
      const parts = value.split("/").map((part) => part.trim()).filter(Boolean);
      const parsed = {
        title: parts.length > 1 ? parts[0] : value,
        project: "기타",
        status: "해야 함",
        dueDate: "",
        priority: "보통",
        estimatedTime: "30분",
        memo: "",
        nextAction: ""
      };

      if (parts.length > 1) {
        parts.slice(1).forEach((token) => applyQuickToken(parsed, token));
      }

      const projectRules = [
        ["공연", ["공연", "남아버린", "조명", "음향", "소품", "의상", "예매", "극장"]],
        ["SMH", ["smh", "대표님", "견적서", "공정표", "일정", "인테리어"]],
        ["가지트", ["가지트", "대관", "청소", "예약", "공간"]],
        ["가치", ["가치", "모임", "오늘의 대사", "감정포커스", "멘토링"]],
        ["개인", ["병원", "건강", "집", "개인", "행정", "돈"]]
      ];

      if (parsed.project === "기타") {
        for (const [project, keywords] of projectRules) {
          if (keywords.some((keyword) => lower.includes(keyword.toLowerCase()))) {
            parsed.project = project;
            break;
          }
        }
      }

      if (!parsed.dueDate) {
        if (value.includes("오늘")) parsed.dueDate = addDays(0);
        else if (value.includes("내일")) parsed.dueDate = addDays(1);
        else if (value.includes("다음주")) parsed.dueDate = thisSunday(1);
        else if (value.includes("이번주")) parsed.dueDate = thisSunday(0);
      }

      if (parsed.priority === "보통") {
        if (["급", "긴급", "필수", "터짐", "오늘 무조건", "무조건", "오늘 안 하면"].some((keyword) => value.includes(keyword))) parsed.priority = "터짐";
        else if (value.includes("중요")) parsed.priority = "높음";
        else if (value.includes("나중")) parsed.priority = "낮음";
      }

      if (parsed.estimatedTime === "30분") {
        if (value.includes("5분")) parsed.estimatedTime = "5분";
        else if (value.includes("15분")) parsed.estimatedTime = "15분";
        else if (value.includes("30분")) parsed.estimatedTime = "30분";
        else if (value.includes("1시간")) parsed.estimatedTime = "1시간";
        else if (value.includes("길게")) parsed.estimatedTime = "길게";
      }

      return parsed;
    }

    function addTask(input) {
      const task = normalizeTask({
        ...input,
        id: makeId(),
        createdAt: new Date().toISOString(),
        completedAt: null
      });
      state.tasks.unshift(task);
      saveTasks();
      renderApp();
      return task;
    }

    function updateTask(id, patch) {
      state.tasks = state.tasks.map((task) => {
        if (task.id !== id) return task;
        const next = normalizeTask({ ...task, ...patch });
        if (next.status === "완료" && !next.completedAt) next.completedAt = new Date().toISOString();
        if (next.status !== "완료") next.completedAt = null;
        if (next.status !== "보류") next.holdReason = "";
        return next;
      });
      saveTasks();
      renderApp();
    }

    async function deleteTask(id) {
      const task = state.tasks.find((item) => item.id === id);
      if (!task) return;
      if (await askConfirm(`"${task.title}"을 삭제할까요?`, { okText: "삭제" })) {
        state.tasks = state.tasks.filter((item) => item.id !== id);
        saveTasks();
        renderApp();
      }
    }

    function completeTask(id) {
      updateTask(id, { status: "완료", completedAt: new Date().toISOString() });
    }

    async function setTaskStatus(id, status) {
      const patch = { status };
      if (status === "보류") {
        const reason = await askReason("보류 사유", "보류 사유를 입력하세요.");
        if (reason === null) return;
        patch.holdReason = reason.trim();
      }
      updateTask(id, patch);
    }

    function sortTasks(tasks) {
      return [...tasks].sort((a, b) => {
        const hotDiff = (a.priority === "터짐" ? 0 : 1) - (b.priority === "터짐" ? 0 : 1);
        if (hotDiff !== 0) return hotDiff;
        const hasDueDiff = (a.dueDate ? 0 : 1) - (b.dueDate ? 0 : 1);
        if (hasDueDiff !== 0) return hasDueDiff;
        if (a.dueDate && b.dueDate && a.dueDate !== b.dueDate) return a.dueDate.localeCompare(b.dueDate);
        const statusDiff = (a.status === "진행 중" ? 0 : 1) - (b.status === "진행 중" ? 0 : 1);
        if (statusDiff !== 0) return statusDiff;
        return new Date(b.createdAt) - new Date(a.createdAt);
      });
    }

    function filteredTasks(tasks = state.tasks) {
      const query = $("#searchInput").value.trim().toLowerCase();
      if (!query) return tasks;
      return tasks.filter((task) => [task.title, task.memo, task.nextAction, task.project, task.holdReason].some((field) => String(field || "").toLowerCase().includes(query)));
    }

    function renderApp() {
      document.querySelectorAll(".tab").forEach((button) => {
        button.classList.toggle("active", button.dataset.tab === state.activeTab);
      });
      if (state.activeTab === "today") renderTodayTab();
      if (state.activeTab === "week") renderWeekTab();
      if (state.activeTab === "project") renderProjectTab();
      if (state.activeTab === "waiting") renderWaitingTab();
      if (state.activeTab === "done") renderDoneTab();
    }

    function renderTodayTab() {
      const tasks = filteredTasks();
      const active = tasks.filter((task) => !["완료", "보류"].includes(task.status));
      const todayDone = tasks.filter((task) => task.status === "완료" && task.completedAt && isToday(task.completedAt.slice(0, 10)));
      const shown = new Set();
      const take = (list) => {
        const unique = list.filter((task) => !shown.has(task.id));
        unique.forEach((task) => shown.add(task.id));
        return unique;
      };
      const sections = [
        ["must", "오늘 무조건", take(active.filter((task) => task.priority === "터짐"))],
        ["today", "오늘 할 일", take(active.filter((task) => isToday(task.dueDate)))],
        ["quick", "5분컷", take(active.filter((task) => task.estimatedTime === "5분"))],
        ["week", "이번 주 마감", take(active.filter((task) => isWithinNextDays(task.dueDate, 7)))]
      ];
      appView.innerHTML = `
        <div class="summary">
          ${statCard(active.filter((task) => isToday(task.dueDate) || task.priority === "터짐").length, "오늘 해야 함")}
          ${statCard(tasks.filter((task) => task.priority === "터짐" && task.status !== "완료").length, "오늘 무조건")}
          ${statCard(tasks.filter((task) => task.status === "보류").length, "보류")}
          ${statCard(todayDone.length, "오늘 완료")}
        </div>
        ${sections.map(([key, title, list]) => renderLimitedSection(key, title, sortTasks(list))).join("")}
      `;
    }

    function renderWeekTab() {
      const tasks = filteredTasks();
      const active = tasks.filter((task) => !["완료", "보류"].includes(task.status));
      const dates = Array.from({ length: 14 }, (_, index) => addDays(index));
      const twoWeekTasks = active.filter((task) => dates.includes(task.dueDate));
      appView.innerHTML = `
        <div class="summary">
          ${statCard(twoWeekTasks.length, "2주 안 마감")}
          ${statCard(twoWeekTasks.filter((task) => isToday(task.dueDate)).length, "오늘")}
          ${statCard(twoWeekTasks.filter((task) => task.priority === "터짐").length, "오늘 무조건")}
          ${statCard(tasks.filter((task) => task.status === "보류").length, "보류")}
        </div>
        <div class="week-grid">
          ${dates.map((dateString, index) => {
            const list = sortTasks(twoWeekTasks.filter((task) => task.dueDate === dateString));
            const title = `${index === 0 ? "오늘 " : index === 1 ? "내일 " : ""}${formatShortDate(dateString)}`;
            return `<div class="week-day">${renderLimitedSection(`week-${dateString}`, title, list)}</div>`;
          }).join("")}
        </div>
      `;
    }

    function statCard(value, label) {
      return `<div class="stat"><strong>${value}</strong><span>${label}</span></div>`;
    }

    function renderLimitedSection(key, title, list) {
      const limit = state.sectionLimits[key] || 5;
      const visible = list.slice(0, limit);
      return `
        <section class="section" data-section-key="${key}">
          <div class="section-head">
            <h2>${escapeHtml(title)}</h2>
            <span class="muted">${list.length}개</span>
          </div>
          ${visible.length ? `<div class="cards">${visible.map(renderTaskCard).join("")}</div>` : `<div class="empty">지금 볼 일이 없습니다.</div>`}
          ${list.length > limit ? `<button type="button" data-action="show-more" data-section="${key}">더 보기</button>` : ""}
        </section>
      `;
    }

    function renderProjectTab() {
      const tasks = filteredTasks();
      appView.innerHTML = PROJECTS.map((project) => renderProjectGroup(project, tasks)).join("");
    }

    function renderProjectGroup(project, tasks) {
      // 별도 분류 필터 없이, 프로젝트별로 전체를 다 보여주고
      // 정렬(sortProjectTasks)로만 급한 일이 위로 오게 합니다.
      const allInProject = tasks.filter((task) => task.project === project);
      const list = sortProjectTasks(allInProject);
      const open = state.expandedProjects.has(project);
      return `
        <section class="project-group">
          <button type="button" class="project-head" data-action="toggle-project" data-project="${project}" aria-expanded="${open}">
            <h2>${project}</h2>
            <span class="badges">
              <span class="badge">미완료 ${allInProject.filter((task) => task.status !== "완료").length}</span>
              <span class="badge">보류 ${allInProject.filter((task) => task.status === "보류").length}</span>
              <span class="badge hot">오늘 무조건 ${allInProject.filter((task) => task.priority === "터짐" && task.status !== "완료").length}</span>
            </span>
          </button>
          ${open ? `<div class="project-body">${list.length ? `<div class="cards">${list.map(renderTaskCard).join("")}</div>` : `<div class="empty">등록된 일이 없습니다.</div>`}</div>` : ""}
        </section>
      `;
    }

    function sortProjectTasks(tasks) {
      const rank = (task) => {
        if (task.priority === "터짐" && task.status !== "완료") return 0;
        return { "진행 중": 1, "해야 함": 2, "보류": 3, "완료": 4 }[task.status] ?? 5;
      };
      return [...tasks].sort((a, b) => {
        const rankDiff = rank(a) - rank(b);
        if (rankDiff !== 0) return rankDiff;
        return sortTasks([a, b])[0].id === a.id ? -1 : 1;
      });
    }

    function renderWaitingTab() {
      const tasks = filteredTasks();
      const undone = tasks.filter((task) => task.status !== "완료");
      const shown = new Set();
      const take = (list) => {
        const unique = list.filter((task) => !shown.has(task.id));
        unique.forEach((task) => shown.add(task.id));
        return unique;
      };
      const sections = [
        ["보류", take(tasks.filter((task) => task.status === "보류"))],
        ["버려도 됨", take(tasks.filter((task) => task.status === "보류" && ["버려", "안 해도", "필요 없"].some((word) => task.holdReason.includes(word))))],
        ["확인 필요", take(undone.filter((task) => [task.title, task.memo, task.nextAction].some((field) => String(field || "").includes("확인"))))]
      ];
      appView.innerHTML = sections.map(([title, list]) => `
        <section class="section">
          <div class="section-head"><h2>${title}</h2><span class="muted">${list.length}개</span></div>
          ${list.length ? `<div class="cards">${sortTasks(list).map(renderTaskCard).join("")}</div>` : `<div class="empty">분리해 둘 일이 없습니다.</div>`}
        </section>
      `).join("");
    }

    function renderDoneTab() {
      const done = sortTasks(filteredTasks().filter((task) => task.status === "완료"));
      const grouped = done.reduce((acc, task) => {
        const key = task.completedAt ? task.completedAt.slice(0, 10) : "날짜 없음";
        acc[key] = acc[key] || [];
        acc[key].push(task);
        return acc;
      }, {});
      const dates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));
      appView.innerHTML = `
        <div class="summary">
          ${statCard(done.filter((task) => task.completedAt && isToday(task.completedAt.slice(0, 10))).length, "오늘 완료")}
          ${statCard(done.filter((task) => task.completedAt && isInCurrentWeek(task.completedAt.slice(0, 10))).length, "이번 주 완료")}
          ${statCard(done.length, "전체 완료")}
          ${statCard(state.tasks.length, "전체 작업")}
        </div>
        <section class="section">
          ${dates.length ? dates.map((date) => renderDoneGroup(date, grouped[date])).join("") : `<div class="empty">완료 기록이 없습니다.</div>`}
        </section>
      `;
    }

    function renderDoneGroup(date, tasks) {
      return `
        <div class="done-group">
          <h2>${date}</h2>
          ${tasks.map((task) => `
            <div class="done-row" data-task="${task.id}">
              <div>
                <strong>${escapeHtml(task.title)}</strong>
                <div class="meta">${escapeHtml(task.project)} · ${escapeHtml(task.estimatedTime)}</div>
              </div>
              <div class="done-actions">
                <button type="button" data-action="restore" data-id="${task.id}">되돌리기</button>
                <button type="button" class="danger" data-action="delete" data-id="${task.id}">삭제</button>
              </div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderTaskCard(task) {
      const priorityClass = task.priority === "터짐" ? "hot" : "";
      const splitOpen = false;
      return `
        <article class="card" data-task="${task.id}" data-priority="${escapeHtml(task.priority)}" data-status="${escapeHtml(task.status)}">
          <div class="card-top">
            <span class="badge tiny accent" data-project="${escapeHtml(task.project)}">${escapeHtml(task.project)}</span>
            <span class="badge tiny ${priorityClass}" data-priority="${escapeHtml(task.priority)}">${escapeHtml(displayPriority(task.priority))}</span>
            <select class="badge tiny status-select" data-action="status-select" data-id="${task.id}" data-status="${escapeHtml(task.status)}" aria-label="상태 변경">
              ${STATUSES.map((s) => `<option value="${s}" ${s === task.status ? "selected" : ""}>${escapeHtml(s)}</option>`).join("")}
            </select>
            <span class="card-top-spacer"></span>
            <button type="button" class="icon-btn" data-action="split-open" data-id="${task.id}" title="쪼개기" aria-label="하위 작업 쪼개기">✂️</button>
            <button type="button" class="icon-btn" data-action="edit" data-id="${task.id}" title="수정" aria-label="수정">✏️</button>
            <button type="button" class="icon-btn danger" data-action="delete" data-id="${task.id}" title="삭제" aria-label="삭제">🗑️</button>
          </div>
          <div class="card-title">
            <strong>${escapeHtml(task.title)}</strong>
          </div>
          ${task.memo ? `<div class="note note-memo"><strong>메모</strong><br>${escapeHtml(task.memo)}</div>` : ""}
          <div class="due-row">
            <span class="due-label">마감</span>
            <input type="date" class="due-input" data-action="due-edit" data-id="${task.id}" value="${escapeHtml(task.dueDate)}" aria-label="마감일 수정">
            <span class="est-time">소요 ${escapeHtml(task.estimatedTime)}</span>
          </div>
          ${task.nextAction ? `<div class="note note-action"><strong>다음 행동</strong><br>${escapeHtml(task.nextAction)}</div>` : ""}
          ${task.holdReason ? `<div class="note note-hold"><strong>보류 사유</strong><br>${escapeHtml(task.holdReason)}</div>` : ""}
          <div class="split-box ${splitOpen ? "open" : ""}" id="split-${task.id}">
            <label>하위 작업을 줄바꿈으로 입력
              <textarea data-split-input="${task.id}" placeholder="1막 장면별 분위기 적기&#10;2막 전환 큐 확인"></textarea>
            </label>
            <button type="button" class="primary" data-action="split-save" data-id="${task.id}">쪼개서 추가</button>
          </div>
        </article>
      `;
    }

    function openEditModal(id) {
      const task = state.tasks.find((item) => item.id === id);
      if (!task) return;
      state.editingId = id;
      $("#editTaskTitle").value = task.title;
      $("#editProject").value = task.project;
      $("#editStatus").value = task.status;
      $("#editDueDate").value = task.dueDate;
      $("#editPriority").value = task.priority;
      $("#editEstimatedTime").value = task.estimatedTime;
      $("#editNextAction").value = task.nextAction;
      $("#editMemo").value = task.memo;
      $("#editHoldReason").value = task.holdReason;
      $("#editHoldReasonField").hidden = task.status !== "보류";
      $("#editModal").classList.add("open");
      $("#editTaskTitle").focus();
    }

    function closeEditModal() {
      state.editingId = null;
      $("#editModal").classList.remove("open");
    }

    function askReason(title, label, initialValue = "") {
      return new Promise((resolve) => {
        state.reasonResolver = resolve;
        $("#reasonTitle").textContent = title;
        $("#reasonLabel").textContent = label;
        $("#reasonInput").value = initialValue;
        $("#reasonModal").classList.add("open");
        $("#reasonInput").focus();
      });
    }

    function closeReasonModal(value) {
      const resolver = state.reasonResolver;
      state.reasonResolver = null;
      $("#reasonModal").classList.remove("open");
      if (resolver) resolver(value);
    }

    function askConfirm(message, options = {}) {
      return new Promise((resolve) => {
        state.confirmResolver = resolve;
        $("#confirmMessage").textContent = message;
        $("#confirmOk").textContent = options.okText || "확인";
        $("#confirmCancel").textContent = options.cancelText || "취소";
        $("#confirmCancel").style.display = options.notice ? "none" : "";
        $("#confirmModal").classList.add("open");
        $("#confirmOk").focus();
      });
    }

    function closeConfirmModal(value) {
      const resolver = state.confirmResolver;
      state.confirmResolver = null;
      $("#confirmModal").classList.remove("open");
      $("#confirmCancel").style.display = "";
      if (resolver) resolver(value);
    }

    function showNotice(message) {
      return askConfirm(message, { okText: "확인", notice: true });
    }

    function splitTask(id, text) {
      const parent = state.tasks.find((task) => task.id === id);
      if (!parent) return;
      const titles = text.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
      if (!titles.length) return;
      const newTasks = titles.map((title) => normalizeTask({
        id: makeId(),
        title,
        project: parent.project,
        status: "해야 함",
        priority: parent.priority,
        estimatedTime: "30분",
        memo: `원래 작업: ${parent.title}`,
        nextAction: "",
        dueDate: "",
        createdAt: new Date().toISOString(),
        completedAt: null
      }));
      state.tasks = [...newTasks, ...state.tasks];
      saveTasks();
      renderApp();
    }

    function timestampForFile() {
      return new Date().toISOString().slice(0, 19).replaceAll(":", "-");
    }

    function downloadTasksJSON(tasks, filename, linkText = "최근 JSON 받기") {
      const blob = new Blob([JSON.stringify(tasks, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = $("#exportLink");
      if (state.exportUrl) URL.revokeObjectURL(state.exportUrl);
      state.exportUrl = url;
      link.href = url;
      link.download = filename;
      link.textContent = linkText;
      link.hidden = false;
      link.click();
    }

    function exportJSON() {
      downloadTasksJSON(state.tasks, `boram_tasks_${toDateInput(todayDate())}.json`);
    }

    function importJSON(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async () => {
        downloadTasksJSON(state.tasks, `boram_tasks_backup_before_import_${timestampForFile()}.json`, "불러오기 전 백업 받기");
        try {
          const data = JSON.parse(reader.result);
          const incoming = migrateTasks(data);
          const overwrite = await askConfirm("기존 데이터를 삭제하고 불러온 데이터로 덮어쓸까요?", { okText: "덮어쓰기", cancelText: "합치기" });
          if (overwrite) {
            state.tasks = incoming;
          } else {
            const ids = new Set(state.tasks.map((task) => task.id));
            state.tasks = [...state.tasks, ...incoming.filter((task) => !ids.has(task.id))];
          }
          saveTasks();
          renderApp();
        } catch {
          await showNotice("JSON 파일을 읽을 수 없습니다.");
        }
      };
      reader.readAsText(file);
    }

    async function clearSampleData() {
      const sampleCount = state.tasks.filter((task) => task.isSample).length;
      if (!sampleCount) {
        await showNotice("삭제할 샘플 데이터가 없습니다.");
        return;
      }
      if (!(await askConfirm(`샘플 데이터 ${sampleCount}개를 삭제할까요?`, { okText: "샘플 삭제" }))) return;
      state.tasks = state.tasks.filter((task) => !task.isSample);
      saveTasks();
      renderApp();
    }

    async function resetAllData() {
      if (!(await askConfirm("정말 전체 삭제할까요?", { okText: "삭제" }))) return;
      if (!(await askConfirm("복구할 수 없습니다. 그래도 삭제할까요?", { okText: "전체 삭제" }))) return;
      removeStoredTasks();
      state.tasks = [];
      saveTasks();
      renderApp();
    }

    function fillSelects() {
      const options = (items, labelFor = (item) => item) => items.map((item) => `<option value="${item}">${labelFor(item)}</option>`).join("");
      $("#editProject").innerHTML = options(PROJECTS);
      $("#editStatus").innerHTML = options(STATUSES);
      $("#editPriority").innerHTML = options(PRIORITIES, displayPriority);
      $("#editEstimatedTime").innerHTML = options(TIMES);
    }

    function submitQuickInput() {
      const input = $("#quickInput");
      const value = input.value.trim();
      if (!value) return;
      addTask(parseQuickInput(value));
      input.value = "";
      input.focus();
    }

    function bindEvents() {
      $("#editStatus").addEventListener("change", () => {
        $("#editHoldReasonField").hidden = $("#editStatus").value !== "보류";
      });

      $("#quickForm").addEventListener("submit", (event) => {
        event.preventDefault();
        submitQuickInput();
      });
      $("#quickInput").addEventListener("keydown", (event) => {
        if (event.key !== "Enter") return;
        event.preventDefault();
        submitQuickInput();
      });

      document.querySelector(".tabs").addEventListener("click", (event) => {
        const button = event.target.closest(".tab");
        if (!button) return;
        state.activeTab = button.dataset.tab;
        renderApp();
      });

      $("#searchInput").addEventListener("input", renderApp);
      $("#exportBtn").addEventListener("click", exportJSON);
      $("#importBtn").addEventListener("click", () => $("#importFile").click());
      $("#importFile").addEventListener("change", (event) => {
        importJSON(event.target.files[0]);
        event.target.value = "";
      });
      $("#syncSettingsBtn").addEventListener("click", openSyncModal);
      $("#syncPullBtn").addEventListener("click", () => pullTasksFromSheet());
      $("#resetBtn").addEventListener("click", resetAllData);
      $("#clearSamplesBtn").addEventListener("click", clearSampleData);
      window.addEventListener("beforeunload", () => {
        if (state.exportUrl) URL.revokeObjectURL(state.exportUrl);
      });
      window.addEventListener("focus", maybeAutoPullFromSheet);
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) maybeAutoPullFromSheet();
      });
      window.setInterval(() => {
        if (!document.hidden) maybeAutoPullFromSheet();
      }, 60000);
      $("#cancelEdit").addEventListener("click", closeEditModal);
      $("#editModal").addEventListener("click", (event) => {
        if (event.target.id === "editModal") closeEditModal();
      });
      $("#cancelReason").addEventListener("click", () => closeReasonModal(null));
      $("#reasonModal").addEventListener("click", (event) => {
        if (event.target.id === "reasonModal") closeReasonModal(null);
      });
      $("#reasonForm").addEventListener("submit", (event) => {
        event.preventDefault();
        closeReasonModal($("#reasonInput").value);
      });
      $("#confirmCancel").addEventListener("click", () => closeConfirmModal(false));
      $("#confirmOk").addEventListener("click", () => closeConfirmModal(true));
      $("#confirmModal").addEventListener("click", (event) => {
        if (event.target.id === "confirmModal") closeConfirmModal(false);
      });
      $("#cancelSync").addEventListener("click", closeSyncModal);
      $("#disableSync").addEventListener("click", disableSyncSettings);
      $("#syncModal").addEventListener("click", (event) => {
        if (event.target.id === "syncModal") closeSyncModal();
      });
      $("#syncForm").addEventListener("submit", (event) => {
        event.preventDefault();
        saveSyncSettings();
      });

      $("#editForm").addEventListener("submit", (event) => {
        event.preventDefault();
        if (!state.editingId) return;
        updateTask(state.editingId, {
          title: $("#editTaskTitle").value.trim(),
          project: $("#editProject").value,
          status: $("#editStatus").value,
          dueDate: $("#editDueDate").value,
          priority: $("#editPriority").value,
          estimatedTime: $("#editEstimatedTime").value,
          nextAction: $("#editNextAction").value.trim(),
          memo: $("#editMemo").value.trim(),
          holdReason: $("#editHoldReason").value.trim()
        });
        closeEditModal();
      });

      appView.addEventListener("click", (event) => {
        const button = event.target.closest("button");
        if (!button) return;
        const id = button.dataset.id;
        const action = button.dataset.action;

        if (action === "toggle-project") {
          const project = button.dataset.project;
          state.expandedProjects.has(project) ? state.expandedProjects.delete(project) : state.expandedProjects.add(project);
          renderApp();
          return;
        }
        if (action === "show-more") {
          const key = button.dataset.section;
          state.sectionLimits[key] = (state.sectionLimits[key] || 5) + 5;
          renderApp();
          return;
        }
        if (action === "edit") openEditModal(id);
        if (action === "delete") deleteTask(id);
        if (action === "restore") updateTask(id, { status: "해야 함", completedAt: null });
        if (action === "split-open") {
          const box = document.getElementById(`split-${id}`);
          if (box) box.classList.toggle("open");
        }
        if (action === "split-save") {
          const input = document.querySelector(`[data-split-input="${id}"]`);
          if (input && input.value.trim()) splitTask(id, input.value);
        }
      });

      // 진행/보류/완료를 하나로 묶은 상태 선택 셀렉트박스.
      appView.addEventListener("change", async (event) => {
        const select = event.target.closest("select[data-action='status-select']");
        if (select) {
          const id = select.dataset.id;
          await setTaskStatus(id, select.value);
          // 사유 입력을 취소해 실제로 상태가 안 바뀐 경우, 화면이 다시 그려지지 않으므로
          // 셀렉트박스 표시를 원래 상태로 되돌립니다.
          const task = state.tasks.find((item) => item.id === id);
          if (task && select.isConnected && select.value !== task.status) {
            select.value = task.status;
            select.dataset.status = task.status;
          }
          return;
        }

        const dueInput = event.target.closest("input[data-action='due-edit']");
        if (dueInput) {
          updateTask(dueInput.dataset.id, { dueDate: dueInput.value });
        }
      });
    }

    fillSelects();
    bindEvents();
    loadSyncConfig();
    loadTasks();
    renderApp();
    if (hasSyncConfig()) pullTasksFromSheet({ silent: true, initial: true });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }

    /*
      점검 체크리스트
      - 빠른 입력으로 할 일이 추가되는가: 확인
      - localStorage에 저장되는가: 확인
      - 새로고침 후 데이터가 유지되는가: 확인
